              title: "1학년 13회차 : 4회차 교육 프롬프트 복습", 
              content: `[📢 지쿱 AI 네트워크마케팅 1학년 13회차 :  4회차 교육 프롬프트 복습]\n\n미션 1. 4회차 교육 프롬프트 이미지 (총10개) 복습하기 🎬\n1. 여러분들의 사진과 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n\n프롬프트 1. \n\n흑백 포토부스 스타일의 4x5 표현 그리드, 모든 20개 패널에 동일한 첨부한 이미지의 인물이 등장하며, 각 패널마다 뚜렷하게 다른 표정을 보여줍니다. 표정에는: 찡그린 행복한 미소, 강렬한 드라마틱 시선, 크게 벌린 입으로 웃는 모습, 지루한 휴식 얼굴, 슬픈 입술을 쭉 내민 표정, 손가락으로 장난스러운 악마 뿔, 혀를 내민 모습, 화난 연극적인 노려봄, 기울인 머리로 플러티한 윙크, 눈이 휘둥그레진 놀람, 가짜 드라마틱 비명, 장난스러운 미소, 혼란스러운 찡그린 눈썹, 눈을 찡그리며 우는 모습, 장난스러운 평화의 상징, 과장된 오리 얼굴이 포함됩니다. 주제는 모든 패널에서 일관된 정체성을 유지합니다. 직접적인 포토부스 플래시 조명으로 평평하고 고른 조명이 비추며, 모든 패널에서 머리와 어깨가 촘촘하게 프레이밍됩니다. 50mm 동등 렌즈로 촬영되었으며, 순수한 흑백으로 중간-높은 대비, 평평한 중성 회색 배경, 미세한 아날로그 필름 그레인 질감이 전체적으로 있습니다. 3:4 화면 비율, 초고해상도 컨택트 시트 미학.\n\n\n프롬프트 2. \n\n"아늑한 예술가 스튜디오 안의 영화 같은 판타지 장면. 페인트 얼룩이 있는 앞치마를 입은 첨부한 이미지의 인물이 이젤에 앉아, 공중에 붓을 들고 캔버스를 차분하게 바라보고 있다. 캔버스에서 웅장한 동양 스타일의 드래곤이 3차원으로 나타나며, 그 비늘은 깊은 청록색과 파란색으로 칠해져 있고, 갈기와 머리 주위에는 흐르는 불타는 주황색 불꽃이 있으며, 연기가 위로 감돌고 있다. 드래곤은 살아 있는 듯하면서도 예술적으로 보이며, 붓 터치와 페인트로 형성된 것처럼 보인다. 부드러운 자연광이 얇은 커튼이 있는 창문을 통해 들어와 나무 작업 공간에 흩어져 있는 붓, 페인트, 예술 용품이 비춰진다. 따뜻하고 사실적인 조명, 얕은 심도, 초고해상도 질감, 마법적 사실주의, 판타지 사실주의 스타일, 8k 품질, 매우 세밀한 묘사, 영화 같은 구성, 부드러운 색 보정, 기발하면서도 평화로운 분위기."\n\n프롬프트 3. \n\n"고급 패션 잡지 화보, 첨부한 이미지의 인물이 서서 카메라를 똑바로 바라보며, 화면 중앙에서 약간 고개를 돌리고, 주변에는 뉴욕 타임스 스퀘어를 빠르게 지나가는 흐릿한 인물 실루엣이 있습니다. 인물의 표정은 차분하고 냉철하며, 검은색 미니멀리즘 의상을 입고 있습니다. 배경은 타임스 스퀘어의 활기찬 조명과 광고판을 보여주며, 약간 추상적이고 밝아 그녀의 정지된 존재와 동적 흐림 사이의 대비를 강조합니다. 편집 스타일, 영화적 구도, 순수 예술 사진, 부드러운 잡지 질감, 고해상도."\n\n프롬프트 4.\n\n"전문 사진, 첨부한 이미지의 인물이 모델(참고 이미지), 카메라를 정면으로 바라보며, 아래에서 위로 촬영, 광각 렌즈 사용. 남성이 몸을 기울이며 가까이에서 카메라에 음료수 병을 보여주고, 한 손으로 병을 잡고 카메라 앞에 밀착. 병의 라벨과 방향이 곧게 유지되어 라벨이 선명하게 읽히도록. 그는 흰색 운동화를 신고 있으며, 한 발이 카메라 앞에 있음. 남성이 거리에서 서 있고, 젖은 아스팔트와 튀는 물방울이 아래에서 촬영됨. 선명한 색상, 영화 같은 조명, 빛이 뒤에서 모델의 얼굴에 비침. --v7 --ar 3:4 --style raw"\n\n프롬프트 5.\n\n"강력한 영화급 콜라주로, 한 프레임 안에서 첨부한 이미지 인물의 완전한 인생 여정을 이야기합니다.\\n이야기는 가장 왼쪽에서 시작되며, 부드럽게 빛나는 흑백 초음파 스캔 이미지가 미리 태어난 아기를 보여줍니다. 중앙으로 부드럽게 전환되며, 콜라주는 인생 단계들을 순차적으로 보여줍니다: 병원 천에 싸인 신생아, 비틀거리며 걷는 유아, 책가방을 멘 초등학생, 꿈으로 가득 찬 인물, 자신감 있게 일하는 젊은 인물, 힘과 지혜가 넘치는 성숙한 인물.\\n가장 오른쪽에서 이야기는 인물의 노인 모습이 창가에 평화롭게 앉아 있는 모습으로 끝납니다. 은발이 따뜻한 석양 속에서 빛나며, 완성과 회상을 상징합니다.\\n각 단계는 찢어진 종이 가장자리, 누출된 빛, 부드러운 운동 궤적, 떠오르는 기억, 시계 요소와 미세한 시간선으로 매끄럽게 연결됩니다.\\n색상 그레이딩은 차가운 단색(출생)에서 생생한 따뜻한 톤(청춘)으로 전환되며, 결국 금빛 부드러운 색조(노년)로 귀결됩니다.\\n극한의 감정, 시적, 영화적 서사, 얕은 심도, 실제 인물의 표정, 고세부 콜라주 구성, 상징적인 인생 여정, 영원하고 고무적인"\n\n프롬프트 6. \n\n{\n"prompt": "기반 <사용자 첨부 이미지>, 첨부한 사진의 인물, 약간 헝클어진 머리, 입에 담배를 물고 아래에서 불꽃을 통해 바라보는 모습. 헝클어진 머리는 자연스럽게 약간의 웨이브가 있으며, 약간 헝클어졌지만 거칠지 않음—힘들이지 않은 헝클임, 생활감 있는 질감. 불꽃을 통해 아래를 바라보며 카메라를 응시하는 반쯤 감긴 눈빛. 냉담하고, 초연하며, 무관심한 표정, 담배는 입술에서 늘어져 있다. 타오르는 신문을 손에 들고 있으며, 하반신 얼굴만 보임—턱, 입술, 담배와 턱이 불꽃을 통해 보인다.\\n\\n검은색 정장 재킷, 어두운 정장. 《뉴욕 타임스》 신문이 앞에 있으며, 신문의 하단 가장자리와 불꽃이 극단적인 전경에 위치하고, 불꽃이 위로 타오르고 있다.\\n\\n전경 요소—카메라가 불꽃을 통과하여 촬영하며, 불꽃 부분이 주체의 하반신 얼굴 시야를 가리고 프레임을 형성한다. 불꽃은 카메라와 주체의 얼굴 사이에 위치하며, 카메라 앞에서 불꽃이 솟아오른다. 따뜻한 주황색과 금색의 불꽃, 전경은 약간 초점이 흐릿하다. 불꽃은 자연스러운 흐림/프레임을 형성하며, 관람자는 불꽃을 통해 턱, 입술, 담배를 볼 수 있다. 담배는 입술에서 늘어져 있고, 점화되어 있으며, 불꽃을 통해 보이고, 연기와 불빛이 섞인다.\\n\\n전경 불꽃을 통한 하반신 얼굴 클로즈업, 35mm f/1.8. 낮은 각도에서 신문 아래에서 수평으로 위로 불꽃을 통해 턱/입을 향해 촬영한다. 카메라가 불타는 신문 가장자리 뒤에 놓인 듯하며, 불꽃을 통해 촬영된다. 전경: 초점이 흐릿한 불꽃과 신문 가장자가 화면 하단/양쪽을 채운다; 중경: 턱, 입술, 담배가 선명하게 초점이 맞춰진다; 배경: 어두운 얼굴이 어둠 속으로 점점 사라진다. 얕은 심도—전경 불꽃이 약간 흐릿하고, 초점은 입술/턱 영역에 맞춰져 있다.\\n\\n단일 광원—오직 불꽃만 있다. 다른 광원은 없으며, 보조 조명도 없고, 환경광도 없다. 타오르는 신문의 불꽃만이 장면을 밝힌다. 불꽃은 얼굴 아래에서 위로 따뜻한 빛을 턱, 아래 입술, 코에 투사한다. 어둡고, 극적이며, 불빛의 명암 대비가 뚜렷하다. 순수한 검은색 환경, 얼굴은 완전히 어둠 속에서 떠오르며, 오직 아래의 불빛만이 비춘다.\\n\\n후지 ETERNA 스타일, 극도로 어둡고 언더 익스포즈, 불꽃은 화면에서 유일한 색상/빛이다. 순수한 검은 배경, 피부에 따뜻한 주황색 불빛, 다른 곳은 깊은 그림자. 전체 노출이 매우 어두워, 검은색이 압축된다.\\n\\n친밀하지만 위협적인 느낌, 불꽃을 통한 엿보는 듯한 시선, 어두운 여성의 힘."\n}\n\n프롬프트 7. \n\n{\n\n"prompt": "특写 스타일화 편집 사진, 거대한 열린 입/치아 구조 내부에 앉아 있는 첨부한 이미지의 인물을 보여줍니다; 입은 극적인 배경으로, 입술은 빛나고, 치아는 다이아몬드 장식의 치아 교정기를 착용하고 있으며, 양쪽은 엮인 머리띠로 감싸져 있습니다. 주체는 캐주얼 스트리트 의상을 입고 편안하게 앉아 있으며, 다리를 벌리고 있습니다. 낮은 각도에서 촬영되었고, 높은 대비, 하드 라이트 스튜디오 조명과 거울 같은 하이라이트가 있으며, 차가운 색조에 파란색이 섞이고 따뜻한 색상이 포인트로 사용되었습니다. 하단 중앙에 GCOOP 로고가 있습니다. 8K, 사진 수준의 편집 스타일."\n\n}\n\n프롬프트 8. \n업로드해주신 인물들을 대상으로 한 전문적인 스튜디오 인물 사진입니다. **하이 앵글(위에서 아래로 내려다보는 구도)**에서 촬영되었으며, 드라마틱한 스포트라이트 조명 아래 인물들의 얼굴이 밝게 빛납니다. 바닥에는 인물들을 중심으로 원형의 헤일로(광륜) 효과가 형성되어 있으며, 중심부가 가장 밝고 가장자리로 갈수록 서서히 어두워집니다. 깔끔하고 미니멀하며 인물에 집중된 구성입니다.\n\n프롬프트 9.\n\n따뜻한 일몰이 내리는 사바나를 배경으로 한 초고화질(8K) 시네마틱 야생 동물 초상화. 첨부한 사진의 인물이 가벼운 마른 풀 질감이 느껴지는 무늬 없는 흰색 티셔츠를 입고, 어깨 위에 앉은 친근한 새끼 사자 옆에 안전하게 무릎을 굽히고 앉아 있는 모습. 옆에는 보호구역의 성체 사자가 그의 뺨을 부드럽게 맞대고 있음. 긴 렌즈가 장착된 소니(Sony) a9iii DSLR 카메라를 들고 있으며, 차분하고 집중된 분위기. 황금빛 아크바르 풀, 부드러운 먼지, 흐릿하게 처리된 아카시아 나무, 깊이 있는 시네마틱 조명.\n\n프롬프트 10. \n핵심 컨셉:\n\n업로드된 참조 이미지를 원본 소스로 사용하여, 모델의 이목구비 특징을 100% 유지한 실사 스타일의 보그 잡지 커버 패션 포트레이트 생성합니다. 첨부한 이미지 인물의 본연의 아름다움을 간직한 채 자신감 넘치는 포즈를 취하고 있습니다.\n\n\n모델의 표정 및 포즈:\n\n왼쪽 눈을 윙크하며 장난스럽게 입술을 내밀고 있습니다.\n양손을 높이 들어 볼 옆에서 하트 모양을 만들고 있습니다.\n\n배경 및 상황:\n\n마치 파파라치와 사진작가들이 사방에서 인물을 찍고 있는 듯, 수많은 DSLR 카메라와 스마트폰에 둘러싸여 있습니다.\n일부 스마트폰 화면에는 인물의 라이브 피드가 표시되고 있습니다.\n\n메이크업 및 스타일링:\n첨부한 이미지가 남자일 경우, 인물을 가장 잘 생기게 보이게 할 수 있는 하이라이트 효과\n첨부한 이미지가 여자일 경우, 결점 없이 빛나는 피부, 모델과 같은 헤어와 메이크업, 부드러운 볼터치와 적절한 하이라이터 효과.\n\n\n의상 및 액세서리:\n첨부한 이미지가 남자일 경우, 프라다 턱시도\n첨부한 이미지가 여자일 경우, 우아하고 심플한 시상식 의상, 의상에 맞는 고급스러운 패션 주얼리 착용.\n\n\n촬영 스타일 및 기술적 사양:\n구도: 클로즈업에서 상반신까지 이어지는 패션 포트레이트, 보그 잡지 편집 스타일, 상단에 크고 눈에 띄는 로고 배치.\n조명: 시네마틱한 전문 스튜디오 조명, 부드러운 HDR 배경, 얕은 심도(아웃포커싱).\n렌즈: 전문 SLR 스타일, 85mm 렌즈 느낌, f/1.8 조리개값, 날카로운 초점과 부드러운 배경 흐림.\n품질: 극도로 세밀한 피부 질감, 울트라 디테일, 8K 해상도.\n\n분위기:\n\n장난스러우면서도 럭셔리한 느낌, 하이엔드 패션 및 뷰티 화보, AI가 만든 티가 나지 않는 전문 패션 사진작가가 촬영한 듯한 자연스럽고 사실적인 분위기.\n\n미션 2. 지쿱 AI 대학교 홍보 인스타그램 전문가 GEM 설정 후 위에서 만든 이미지로 인스타그램 올리기 \n\n1. GEM에 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n2. GEM을 설정한 후 미션 1에서 만든 이미지를 바탕으로 공지를 만들어주세요\n3. 본인의 인스타그램에 업로드 해주세요! \n\nGEM 프롬프트  \n\n지쿱 AI 대학교 홍보 인스타그램을 만들거야! \n\n이미지나 동영상을 올리면 지쿱 AI 대학교 입학하라는 내용으로 인스타그램 피드용으로 바꿔줘.\n\n이모지(✨🔥👍)를 풍부하게 사용해서 시선을 끌어줘.\n\n가독성을 위해 줄 바꿈을 자주 해줘.\n\n글은 500자 내에서 만들어줘. \n\n마지막에 #지쿱AI대학교 #지쿱김유신 #지쿱 #건강 #부업 등 관련 해시태그 5개를 달아줘.`,

                            <div className="relative">
                                <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="프롬프트 검색..." className="w-full pl-9 pr-4 py-2 bg-slate-100 border-none rounded-xl text-xs outline-none focus:ring-1 focus:ring-indigo-500" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                        </div>
                        
                        <div className="relative flex items-center bg-white px-1 shadow-sm">
                            <button onClick={() => scrollNav('left')} className="p-2 text-slate-400 active:text-indigo-600 z-10 bg-white/80">
                                <Icon name="chevron-left" size={20} />
                            </button>
                            <nav ref={scrollRef} className="flex items-center gap-2 overflow-x-auto no-scrollbar py-3 flex-1 px-1">
                                {CATEGORIES.map(cat => (
                                    <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-[11px] font-bold border transition-all ${selectedCategory === cat ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                        {cat.includes('.') ? cat.split('.')[1].trim() : cat}
                                    </button>
                                ))}
                            </nav>
                            <button onClick={() => scrollNav('right')} className="p-2 text-slate-400 active:text-indigo-600 z-10 bg-white/80">
                                <Icon name="chevron-right" size={20} />
                            </button>
                        </div>
                    </div>

                    <main className="pt-44 p-3 grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 max-w-6xl mx-auto">
                        {filteredPrompts.map(prompt => {
                            const isSpecial = prompt.category.includes("일일과제") || prompt.category.includes("GEMS");
                            const hasImage = !!prompt.imageUrl;
                            const hasLink = prompt.content.includes("http");

                            return (
                                <div key={prompt.id} onClick={() => setSelectedPrompt(prompt)} className="group bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 flex flex-col transition-all active:scale-95 cursor-pointer relative min-h-[160px]">
                                    {!isSpecial && hasImage ? (
                                        <div className="relative aspect-[9/16] sm:aspect-[4/5] bg-slate-100 overflow-hidden">
                                            <img src={prompt.imageUrl} className="w-full h-full object-cover transition-transform group-hover:scale-105" loading="lazy" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-80" />
                                            <div className="absolute bottom-2 left-2 right-2 text-white">
                                                <p className="text-[8px] font-bold text-indigo-300 mb-0.5 truncate uppercase">{prompt.category.split('.')[0] || '지쿱'}</p>
                                                <h3 className="font-bold text-[11px] leading-tight line-clamp-1">{prompt.title}</h3>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className={`p-4 flex-1 flex flex-col gap-2 ${isSpecial ? 'bg-indigo-50/40' : 'bg-slate-50/50'}`}>
                                            <div className="flex items-center gap-1.5 text-indigo-700">
                                                <Icon name={hasLink ? "globe" : "clipboard-list"} size={14} />
                                                <span className="text-[9px] font-black uppercase tracking-tighter">{isSpecial ? "TASK/GEMS" : "BASIC"}</span>
                                            </div>
                                            <h3 className="font-bold text-[12px] text-slate-900 leading-snug line-clamp-2">{prompt.title}</h3>
                                            <p className="text-[10px] text-slate-500 line-clamp-2 italic leading-relaxed">{prompt.content}</p>
                                        </div>
                                    )}

                                    <div className="p-2 bg-white flex gap-1 border-t border-slate-100 mt-auto">
                                        {hasLink ? (
                                            <button onClick={(e) => handleVisitLink(e, prompt.content)} className="flex-1 flex items-center justify-center gap-1 py-1.5 rounded-lg text-[10px] font-bold bg-indigo-600 text-white shadow-sm"><Icon name="external-link" size={12} /> 바로가기</button>
                                        ) : (
                                            <button onClick={(e) => { e.stopPropagation(); handleCopy(prompt.content, prompt.id); }} className={`flex-1 py-1.5 rounded-lg text-[10px] font-bold ${copiedId === prompt.id ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-600'}`}>복사</button>
                                        )}
                                        {hasImage && (
                                            <button onClick={(e) => handleDownload(e, prompt.imageUrl, prompt.title)} className="p-1.5 bg-slate-50 text-slate-400 rounded-lg border active:bg-indigo-50"><Icon name="download" size={14} /></button>
                                        )}
                                        <button onClick={(e) => handleShare(e, prompt)} className="p-1.5 bg-slate-50 text-slate-400 rounded-lg border active:bg-indigo-50"><Icon name="share-2" size={14} /></button>
                                    </div>
                                </div>
                            );
                        })}
                    </main>

                    {selectedPrompt && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 overflow-hidden">
                            <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md" onClick={() => setSelectedPrompt(null)} />
                            <div className="relative bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden flex flex-col h-auto max-h-[90vh] shadow-2xl animate-in zoom-in-95 duration-300 border border-slate-200">
                                <button onClick={() => setSelectedPrompt(null)} className="absolute top-4 right-4 z-50 bg-black/40 text-white p-2 rounded-full hover:bg-black/60 transition-all"><Icon name="x" size={18} /></button>
                                
                                <div className="flex flex-col h-full overflow-hidden">
                                    {selectedPrompt.imageUrl && (
                                        <div className="w-full shrink-0 h-[35vh] overflow-hidden relative bg-slate-100 border-b border-slate-100">
                                            <img src={selectedPrompt.imageUrl} className="w-full h-full object-contain" />
                                        </div>
                                    )}

                                    <div className="p-5 flex flex-col min-h-0 flex-1">
                                        <div className="flex items-center justify-between mb-2">
                                            <span className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full border border-indigo-100 uppercase tracking-tight">{selectedPrompt.category}</span>
                                            <button onClick={(e) => handleShare(e, selectedPrompt)} className="flex items-center gap-1 text-slate-400 text-[10px] font-bold active:text-indigo-600">
                                                <Icon name="share-2" size={12} /> 공유
                                            </button>
                                        </div>
                                        <h2 className="text-lg font-black text-slate-900 mb-3 leading-tight line-clamp-2">{selectedPrompt.title}</h2>
                                        
                                        <div className="bg-slate-100/50 p-4 rounded-xl border border-slate-100 shadow-inner flex-1 overflow-y-auto custom-scrollbar mb-4">
                                            <p className="text-slate-800 text-[13px] font-medium leading-relaxed whitespace-pre-wrap">
                                                {selectedPrompt.content}
                                            </p>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 gap-2 shrink-0">
                                            {selectedPrompt.content.includes("http") && (
                                                <button onClick={(e) => handleVisitLink(e, selectedPrompt.content)} className="py-3.5 rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-md flex items-center justify-center gap-2 active:scale-95">
                                                    <Icon name="external-link" size={16} /> 링크 방문하기
                                                </button>
                                            )}
                                            {selectedPrompt.imageUrl && (
                                                <button onClick={(e) => handleDownload(e, selectedPrompt.imageUrl, selectedPrompt.title)} className="py-2.5 rounded-xl bg-white border border-indigo-200 text-indigo-600 font-bold text-xs flex items-center justify-center gap-2 active:bg-indigo-50">
                                                    <Icon name="download" size={14} /> 이미지 저장
                                                </button>
                                            )}
                                            <button onClick={() => handleCopy(selectedPrompt.content, selectedPrompt.id)} className={`py-2.5 rounded-xl font-bold text-xs shadow-sm transition-all active:scale-95 ${copiedId === selectedPrompt.id ? 'bg-green-500 text-white' : 'bg-white text-indigo-600 border border-indigo-200'}`}>
                                                {copiedId === selectedPrompt.id ? '복사 완료!' : '내용 복사하기'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showToast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[110] bg-slate-800 text-white px-5 py-2 rounded-full shadow-2xl text-[11px] font-bold animate-bounce">
                            {showToast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
