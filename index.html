        const INITIAL_PROMPTS = [
            // 1주차
            { id: 101, category: "1.지쿱AI대학교 1학년 1주차", title: "힙합 골든 리트리버 (1-1)", content: "귀여운 골든 리트리버 강아지, 힙합 스타일의 빨간색 털모자와 선글라스, 카메라를 정면으로 응시, 매우 사실적인 4K 사진 스타일", imageUrl: "images/1.jpg" },
            { id: 102, category: "1.지쿱AI대학교 1학년 1주차", title: "전문가 프로필 사진 (1-2)", content: "깔끔한 정장 차림의 CEO/전문가, 배경은 모던한 공유 오피스, 신뢰감을 주는 미소와 조명, 링크드인 프로필 사진 스타일", imageUrl: "images/2.jpg" },
            { id: 103, category: "1.지쿱AI대학교 1학년 1주차", title: "배경 변경: 에펠탑 카페 (1-3)", content: "인물은 그대로 유지하고 배경만 바꿔줘. 프랑스 파리의 에펠탑이 보이는 노천 카페, 따뜻한 햇살과 여유로운 분위기, 여행 인플루언서 사진 스타일", imageUrl: "images/3.jpeg" },
            { id: 104, category: "1.지쿱AI대학교 1학년 1주차", title: "의상 변경: 가을 화보 (1-4)", content: "얼굴은 유지하고 옷만 바꿔줘, 최신 트렌드의 오버핏 코트와 머플러, 가을 거리의 패션 화보 느낌, 세련되고 도시적인 분위기", imageUrl: "images/4.jpeg" },
            { id: 105, category: "1.지쿱AI대학교 1학년 1주차", title: "치즈 소(영상) (1-5)", content: "[영상생성 프롬프트]\n환상적인 알프스 풍경 위로 2D 스톱모션 애니메이션이 부드럽게 흘러갑니다. 모든 요소은 마치 손으로 만든 듯한 평면 치즈로 만들어졌습니다. 배경에는 두꺼운 에멘탈과 그뤼에르 치즈 덩어리로 쌓아 올린 삼각형 모양의 산들이 우뚝 솟아 있고, 산봉우리에는 질감 있는 껍질과 갈아낸 파르메산 치즈가 눈처럼 흩어져 있습니다. 그 사이에는 푸른 치즈로 만든 드라마틱한 절벽이 깊이감과 대비를 더합니다. 하늘은 부드러운 라클렛 노란색으로 빛나고, 곱슬곱슬한 모짜렐라와 휘핑한 부라타로 만든 솜털 같은 구름이 떠다닙니다. 아래쪽으로는 황금빛 에멘탈 고원이 펼쳐지고, 구멍이 뚫린 듯한 무늬와 완만한 치즈 언덕들이 곳곳에 자리합니다. 스위스 치즈 슬라이스와 체다 치즈 패널로 만들어진 스타일리시한 소가 장면 위를 차분하게 걸어갑니다. 소의 뿔은 숙성된 페코리노 치즈로 만들어졌고, 속이 빈 훈제 고다 치즈 조각이 끈으로 된 목걸이에 매달려 소방울처럼 흔들립니다. 소나무는 허브로 코팅된 치즈 원뿔을 쌓아 올린 모양이며, 줄기는 더 어두운 색의 껍질로 표현되어 있습니다. 구운 체다 치즈 블록과 고다 치즈 타일로 지어진 알프스 산장들이 지형 사이에 옹기종기 모여 있다. 카메라가 천천히 움직이며 부드러운 빛을 받아들이고, 녹아내릴 듯한 치즈의 섬세한 디테일을 포착한다. 마치 치즈로만 이루어진 스위스의 환상적인 풍경이 완성된 듯하다.", imageUrl: "images/5.jpeg" },
            { id: 106, category: "1.지쿱AI대학교 1학년 1주차", title: "헬스장 근육남(영상) (1-6)", content: "[영상생성 프롬프트]\n\n헬스장 탈의실에서 근육질의 한국인 피트니스 인플루언서가 거울에 비친 자신의 모습을 노려보고 있다. 그는 자신에게 화를 내며 소리치다가 조용히 흐느끼며 프라이드 치킨이 먹고 싶다고 고백한다. 이 장면은 35mm 핸드헬드 카메라와 50mm 렌즈로 촬영되어 친밀하고 솔직한 느낌을 자아낸다. 낮은 콘트라스트가 특징이다.  대사는 한국어다", imageUrl: "images/6.jpeg" },

            // 2주차
            { id: 201, category: "2.지쿱AI대학교 1학년 2주차", title: "수염난 전문가 프로필 (2-1)", content: "첨부한 얼굴 이미지를 주요 얼굴 참조로 활용하여 동일한 인물임을 유지하되, 눈 선명도, 피부결 개선, 대칭적인 얼굴 윤곽 보정, 입체감 있는 수염 디테일을 강화해 더욱 세련되고 멋진 비율로 업그레이드합니다. 본래 인상의 신뢰감과 친근한 미소를 그대로 유지하며 전문성·카리스마가 돋보이는 하이엔드 퀄리티로 표현합니다.\n얼굴 & 헤어 & 수염 : 깔끔하게 넘긴 포마드 스타일 헤어\n수염 디테일은 선명하면서 자연스럽게 정리\n지적인 분위기를 살려주는 블랙 프레임 안경 유지\n이목구비는 뚜렷하게, 광대/턱선은 자연스럽게 슬림\n눈가에 생기 있는 하이라이트 (과하지 않게)\n의상 & 스타일 요소 : 고급 원단의 다크 네이비 맞춤 정장\n클래식한 화이트 셔츠 + 블랙 솔리드 타이\n왼손 손목에 럭셔리 워치 착용, 깔끔하고 정교한 스타일링 유지\n포즈 & 구도 : 팔짱을 자연스럽게 낀 포즈\n상체 중심 4:5 비율 프레이밍\n카메라를 향해 자신감 있는 시선\n미소는 자연스럽고 신뢰감 있는 표정 유지\n배경 & 조명 : 딥 그레이 톤의 프리미엄 스튜디오 배경\n부드러운 3포인트 라이트로 얼굴 중심 강조\n수염과 안경 반사 최소화한 고급 조명 처리\n초고해상도 8K, 노이즈 완벽 제거\n무드 & 스타일 디렉션 : 컨설턴트, 금융 임원, 테크 리더 이미지\n신뢰감 + 전문성 + 지적 매력 전달\nLinkedIn / 기업 프로필에 최적화된 톤", imageUrl: "images/7.jpeg" },
            { id: 202, category: "2.지쿱AI대학교 1학년 2주차", title: "초실사 3x3 그리드 (2-2)", content: "업로드된 사진과 100% 동일한 얼굴 정체성을 사용하여 같은 인물의 초실사 8K 인물 사진 9장을 생성하세요. 이를 3x3 그리드(세로 비율)로 배열하고, 각 이미지 속 인물은 서로 다른 색상의 비즈니스 수트(단색과 체크무늬 혼합)를 착용해야 합니다. 각 장면은 고유한 포즈, 몸짓, 그리고 배경 색조를 갖추어야 합니다..", imageUrl: "images/8.jpeg" },
            { id: 203, category: "2.지쿱AI대학교 1학년 2주차", title: "지쿱간판 빨간후드 (2-3)", content: "[핵심 피사체 및 구도]\n\n업로드된 이미지 속 인물의 하이퍼 리얼리스틱(초실사) 전신 인물 사진입니다. 인물은 '앉아 있는' 자세를 취하고 있습니다. 그 옆에는 지면에 단단히 고정된 세로형 대형 GCOOP 간판이 서 있으며, 세련된 미적 감각을 위해 약간 기울어져 있습니다. 이 오브젝트는 대략 인물의 팔 높이 정도여서, 한쪽 팔을 자연스럽게 얹어 기댈 수 있는 높이입니다. 반대쪽 손에는 '컵'을 들고 있습니다.\n\n[카메라 및 조명 설정]\n카메라: 풀프레임 DSLR 카메라 시뮬레이션, 얕은 심도(아웃포커싱)가 적용된 선명한 이미지.\n\n배경: 부드럽고 영화적인 조명이 얼굴과 어깨를 자연스럽게 감싸며 섬세한 그림자와 깊이감을 만드는 미니멀한 파스텔 블루 스튜디오.\n\n[디테일 및 의상]\n의상: 인물은 빨간색 스트리트 웨어 후드티, 검은색 바지, 흰색 신발을 착용하고 있습니다.\n\n질감: 옷감, 피부, 머리카락, 그리고 오브젝트 표면의 질감이 극도로 상세하게 표현되어야 합니다.\n\n[전체적인 스타일]\n\n깨끗하고 미니멀하며 현대적이고 시각적으로 강렬한 렌더링 스타일입니다. CGI 느낌이 아닌, 전문적인 패션 화보처럼 보여야 합니다.", imageUrl: "images/9.png" },
            { id: 204, category: "2.지쿱AI대학교 1학년 2주차", title: "피카츄 꼬부기 화보 (2-4)", content: "피카츄 꼬부기와 함께하는 하이엔드 화보 프롬프트\n\n핵심 컨셉:\n첨부한 이미지의 원래 얼굴을 완벽하게 보존하며 스타일화나 변형이 전혀 없는 하이퍼 리얼리스틱 포토리얼리스틱 이미지.\n\n모델 및 의상:\n\n인물: 자신감 넘치는 표정의 인물. 생동감 있고 밝은 에너지를 풍기며 꼬부기와 장난스럽게 상호작용함.\n의상: 무광 블랙의 고급스러운 선글라스, 풍부한 짜임이 돋보이는 꼬부기와 같은 하늘색 톤의 니트 스웨터, 깔끔한 핏의 블랙 하이웨이스트 청바지, 블랙 & 화이트 하이탑 스니커즈 착용.\n디테일: 선글라스에 은은한 스튜디오 반사광이 맺혀 있으며 전체적인 룩에 자연스럽게 어우러짐.\n피카츄 묘사:\n\n거대한 3D 포토리얼리스틱 꼬부기. 사실적인 털의 질감과 부드러운 조명이 적용됨.\n인물의 팔 아래에서 활기차고 쾌활한 모습으로 인물을 올려다보며 미소 짓고 있음.\n배경 및 기술 사양:\n\n배경: 매끄러운 그라데이션과 깊이감이 느껴지는 선명한 꼬부기 칼라 스튜디오 배경.\n마무리: 대담하고 즐거운 분위기의 하이엔드 잡지 화보(Editorial) 스타일. 날카로운 초점과 자연스러운 색상 균형.", imageUrl: "images/10.png" },
            { id: 205, category: "2.지쿱AI대학교 1학년 2주차", title: "지쿱입학 맨투맨 (2-5)", content: "\"50mm 렌즈로 촬영한 시네마틱한 로우 앵글 인물 사진입니다. 업로드된 얼굴을 참조한 인물 피사체를 아래에서 위로 올려다보는 구도이며, 인물은 양팔을 올린 채 낡은 콘크리트와 금속 난간에 자연스럽게 기대어 있습니다. 피사체는 햇살을 받은 듯한 하이라이트가 있는 짧은 흑발을 가졌으며, 헐렁하게 떨어지는 오버사이즈의 질감 있는 베이지색 긴소매 크루넥 맨투맨을 입고 있습니다. 맨투맨에는 검정색 글씨로 \"지쿱 AI 대학교 입학하세요'라고 크게 씌어 있습니다. 인물은 사색적인 표정으로 오른쪽 상단을 응시하고 있으며, 턱선 아래에 부드러운 그림자를 만들고 피부의 질감을 강조하는 부드럽고 따뜻한 자연광을 받고 있습니다. 구도상 오른쪽에는 구조물의 강한 전경 흐림(보케) 처리가 되어 있어 깊이감을 더하고 피사체를 돋보이게 합니다. 배경은 광활하고 짙은 청록색(Teal-Cyan) 하늘로 채워져 있어, 아날로그 필름 사진의 전형적인 특징인 인상적인 '틸 앤 오렌지(Teal and Orange)' 색감을 연출합니다.\"", imageUrl: "images/11.png" },
            { id: 206, category: "2.지쿱AI대학교 1학년 2주차", title: "캐논 디지털 카메라 (2-6)", content: "컴팩트한 캐논 디지털 카메라 화면에 표시된 첨부한 이미지의 인물 클로즈업 샷입니다. 카메라 바디의 버튼, 다이얼, 질감이 화면 속 이미지와 함께 보입니다. 화면 속 사진은 밤에 실내에서 촬영된 것으로, 밝은 내장 플래시가 얼굴과 머리카락에 강한 하이라이트를 만들어냅니다.", imageUrl: "images/12.png" },
            { id: 207, category: "2.지쿱AI대학교 1학년 2주차", title: "미니어처 치비 (2-7)", content: "극사실적인 메인 주인공 주변에, 그와 동일한 이목구비, 헤어스타일, 신체 비율, 의상을 가진 귀여운 3D 스타일의 치비(Chibi) 미니어처 여러 명이 둘러싸고 있습니다.\n이 치비 캐릭터들은 주인공 주변에 자연스럽게 배치되어 있으며, 주인공 또는 주변 요소들과 매력적이고 방해되지 않는 방식으로 장난스럽게 상호작용하고 있습니다.\n이미지 위에는 생동감 넘치는 손그림 낙서(Doodle) 효과가 겹쳐져 있습니다: 주인공 주변의 부드러운 흰색 테두리, 반짝이는 효과, 하트 낙서, 작은 꽃, 스마일 아이콘, 그리고 \"shine\", \"bright night\", \"happy vibes\"와 같은 떠다니는 흰색 손글씨 문구들이 포함됩니다.\n전체적인 스타일은 하이퍼 리얼리스틱 사진과 알록달록하고 부드러운 카툰 일러스트레이션이 자연스럽게 조화를 이룹니다.\n단, 메인 주인공의 원래 얼굴, 체형 및 비율은 수정 없이 그대로 유지합니다", imageUrl: "images/13.png" },
            { id: 208, category: "2.지쿱AI대학교 1학년 2주차", title: "몽환적 밤 (남자) (2-8-1)", content: "남자\n어둡고 몽환적이며 빈티지한 느낌의 바람 부는 밤, 차 창밖으로 등을 기대고 있는 저의 사진을 만들어 주세요. 흰색 와이셔츠 상의를 입고 머리 스타일은 유지해주세요! 얼굴의 세부 사항을 정확하게 유지해 주세요. 얼굴 특징을 변형하지 말고 머리 위치도 그대로 유지해 주세요.", imageUrl: "images/14.png" },
            { id: 209, category: "2.지쿱AI대학교 1학년 2주차", title: "몽환적 밤 (여자) (2-8-2)", content: "여자 \n어둡고 몽환적이며 빈티지한 느낌의 바람 부는 밤, 차 창밖으로 등을 기대고 있는 저의 사진을 만들어 주세요. 오프숄더 스타일의 흰색 니트 상의를 입고 갈색의 긴 웨이브 머리를 하고 있습니다. 얼굴의 세부 사항을 정확하게 유지해 주세요. 얼굴 특징을 변형하지 말고 머리 위치도 그대로 유지해 주세요.", imageUrl: "images/15.png" },
            { id: 210, category: "2.지쿱AI대학교 1학년 2주차", title: "스포츠 헌정 포스터 (2-9)", content: "역할: 컨셉 헌정 포스터를 제작하는 하이엔드 스포츠 그래픽 디자이너. 스타일: 혼합 미디어 질감이 가미된 복합적인 '이중 노출 포토 그리드 합성(dual exposure photo-grid composite)'.\n\n중앙 구조 (더 베슬):\n\n중앙의 핵심 요소는 [인물 이름]의 고대비 흑백 인물 실루엣입니다. 이 메인 초상화가 전체 이미지를 담아내는 거대한 그릇 역할을 합니다.\n\n그리드 채우기 및 질감 (혼합 미디어):\n\n실루엣의 내부는 해당 인물의 커리어 중 포착된 역동적인 액션 샷들로 구성된 조밀한 '포토 모자이크 그리드'로 채워집니다.\n\n중요 질감 지침: 단순히 평면적인 사진을 붙이지 마세요. 각 그리드 셀에 예술적인 질감을 적용해 촉감이 느껴지는 콜라주 분위기를 연출하세요. 다음과 같은 효과를 사용합니다:\n\n망점(Halftone Dots): 일부 셀에 만화책 스타일의 래스터 패턴 적용.\n\n패브릭/자수(Fabric/Embroidery): 저지나 패치를 연상시키는 미세한 실 또는 캔버스 질감.\n\n필름 그레인(Film Grain): 특정 고대비 액션 샷에 강렬한 노이즈 효과 적용.\n\n컬러 전략: 기본 베이스는 모노크롬 흑백입니다. 리듬감을 형성하기 위해 특정 그리드 셀에만 (팀 또는 국기에 어울리는) 선택적 컬러 오버레이를 사용하세요.\n\n타이포그래피 및 브랜딩 (엄격한 미세 스케일링):\n좌측 상단 (이름): '[인물 이름]'을 적으되, 반드시 Inter Semibold 폰트를 사용하세요. 자간(Kerning): 좁게 설정(-4%). 크기: 작고 눈에 띄지 않게. 캔버스 너비의 최대 20%를 넘지 않아야 하며, 크거나 요란하게 만들지 마세요.\n\n우측 상단 (심볼): 주요 로고(팀/브랜드/국기)를 배치하세요. 크기: 아주 작게. 캔버스 너비의 최대 10%를 넘지 않아야 합니다.\n\n구도 및 배경:\n배경: 오프화이트(Off-white) 또는 밝은 회색으로, 고품질 종이 혹은 콘크리트 질감이 눈에 보여야 합니다. 단순한 디지털 화이트 평면을 피하세요.\n\n정렬: 인물을 정중앙에 배치하세요. 개체 주변에 넓은 여백(Negative Space)을 유지하세요.", imageUrl: "images/16.png" },
            { id: 211, category: "2.지쿱AI대학교 1학년 2주차", title: "하이패션 포트레이트 (2-10)", content: "업로드된 이미지 속 인물이 화이트 빈티지 셰이즈 롱(chaise lounge) 위에 우아하게 앉아 있는 하이패션 스튜디오 포트레이트. 인물의 긴 실루엣의 구조적인 딥 블루 맞춤형 비즈니스 정장을 입고 있습니다. 팔걸이에 한쪽 팔을 얹고 다리를 꼬고 앉아, 차분하면서도 에디토리얼한 표정으로 자신감 있게 포즈를 취하고 있습니다.\n\n배경에는 인물의 얼굴을 각진 다각형(polygonal) 형태로 표현한 대형 흑백 기하학 벽화가 배치되어 있습니다. 미니멀한 스튜디오 설정, 부드럽게 분산된 조명, 깨끗한 화이트 배경, 시네마틱한 그림자, 사실적인 피부 톤, 럭셔리 패션 잡지 스타일, 파인 아트 구성, 미묘한 대비, 초고해상도, 정제되고 시대를 초월한 분위기.", imageUrl: "images/17.png" },
            { id: 212, category: "2.지쿱AI대학교 1학년 2주차", title: "스티커 콜라주 포스터 (2-11)", content: "깨끗하고 순수한 화이트 배경 위에 놓인 세로형 포스터 스타일의 콜라주 디자인.\n\n배경 레이아웃은 3~4개의 가로형 라운드 직사각형이 층층이 쌓인 구조이며, 각 칸에는 동일한 인물의 서로 다른 포즈를 담은 시네마틱한 흑백 포트레이트 사진들이 배치되어 있습니다.\n\n전경(foreground)의 약간 왼쪽에는 동일한 인물이 자신감 넘치는 포즈를 취하고 있는 고화질 컬러 컷아웃(누끼) 이미지가 위치합니다. 전경의 인물은 테두리에 화이트 스티커 스타일의 외곽선이 처리되어 있어, 화이트 캔버스 위에서 명확하게 도드라지는 레이어드 콜라주 효과를 연출합니다.\n\n하이패션 에디토리얼 미학, 깔끔한 구성, 흑백 배경 패널과 컬러 전경 모델 사이의 강렬한 대비. 사실적인 질감, 스튜디오 조명, 초고해상도, 선명한 초점.", imageUrl: "images/18.png" },
            { id: 213, category: "2.지쿱AI대학교 1학년 2주차", title: "LOMO LC-A 스타일 (2-12)", content: "【참고 사진 인물】을 기반으로 합니다. 이 작품은 LOMO LC-A 스타일의 고화질 사진입니다. 하이 앵글(High angle shot) 시점을 채택하여, 시선은 첨부 사진 인물에게 집중됩니다.\n\n그녀는 {argument name=\"服装\" default=\"검은색 긴 트렌치코트\"}를 입고 있으며, 얼굴과 분위기는 【참고 사진 인물】과 완벽하게 일치합니다. 첨부 사진 인물은 바닥을 가득 메운 수많은 흑백 패션 광고판 위에 서 있습니다.\n\n하이 앵글 시점 덕분에 바닥에 깔린 모든 광고판 속 모델들 또한 시선은 첨부 사진 인물. 자신의 각기 다른 패션 화보임을 알 수 있으며, 마치 시선은 첨부 사진 인물이 자신의 수많은 분신들 위에 서 있는 듯한 신비로운 느낌을 줍니다.", imageUrl: "images/19.png" },
            { id: 214, category: "2.지쿱AI대학교 1학년 2주차", title: "레드-블루 이중 노출 (2-13)", content: "동일한 캐릭터의 두 가지 포즈를 활용하여 예술적인 레드-블루 이중 노출(Double-exposure) 효과를 적용하세요:\n\n기본 레이어: 오리지널 포즈를 유지합니다.\n\n보조 레이어: 머리 각도, 시선 처리 또는 표정이 마치 찰나의 전후 순간을 포착한 것처럼 미세하게 다른 두 번째 포즈를 생성합니다.\n\n색상 및 효과: 두 번째 포즈는 레드(Red)로, 기본 포즈는 시안(Cyan, 청록)으로 색을 입힙니다. 두 레이어를 살짝 어긋나게 배치하여 깔끔한 잔상 효과(Ghosting effect)를 만듭니다", imageUrl: "images/20.png" },
            { id: 215, category: "2.지쿱AI대학교 1학년 2주차", title: "미니멀 종이 포스터 (2-14)", content: "{\n  \"prompt\": \"어깨 위에서 [Character Name]의 초상을 묘사한 영화 스타일의 미니멀리스트 색상 포스터. 얼굴은 간단한 그리드에 배열된 적은 수의 큰 정사각형 종이 조각으로 재현됩니다 [약 4x5 또는 5x6 조각]. 각 종이 조각은 얼굴의 별개의 부분을 포함하고 있으며, 함께 완전한 초상을 형성합니다. 얼굴을 구성하는 내부 종이 조각들은 완벽하게 평평하지 않으며, 많은 조각들이 약간 말린 가장자리와 들린 모서리를 가지고 있어, 작은 사실적인 그림자를 드리워 3차원적이고 붙여진 듯한 외관을 제공합니다. 이 네 개의 정사각형 중에는 피부/이미지 위에 직접 나타나는 미세한 검은색 손글씨 노트 [text1, text2, text3, text4]가 있습니다. 이 중앙 그리드의 외곽에는 여러 스티커 [Sticker Color]가 다양한 임의의 위치(모서리에 한정되지 않음)에 부착되어 있으며, 손글씨로 된 [Outer Text, e.g., iconic quotes]를 포함하고 있습니다. 전체 구성은 약간 불규칙하며, 조각들 사이에 보이는 간격이 있어 배경에 콘크리트 벽 [Color]가 드러납니다. 작품 전반에 걸쳐 사실적인 종이 질감이 있으며, 들린 가장자리를 강조하는 고품질 스튜디오 조명과 잉크 및 종이 결에 대한 선명한 초점이 특징입니다.\"\n}", imageUrl: "images/21.png" },
            { id: 216, category: "2.지쿱AI대학교 1학년 2주차", title: "마주보는 초상화 (2-15)", content: "두 인물의 얼굴이 화면 양쪽을 차지하며 정면을 응시하고 있는 드라마틱한 클로즈업 초상화:\n\n화면 왼쪽: 첨부한 첫번째 사진 인물의 오른쪽 얼굴. 중앙(오른쪽)을 향한 시선, 자연스러운 피부톤, 감정이 담긴 눈빛.\n\n화면 오른쪽: 첨부한 두번째 사진 인물의 왼쪽 얼굴. 중앙(왼쪽)을 향한 시선, 대비되는 피부톤, 강렬하고 극적인 표정.\n\n구도 및 스타일:\n\n배치: 얼굴들이 프레임의 가장자리에 위치함.\n\n배경: 미니멀한 순백색 또는 부드러운 중립 톤의 그라데이션. 얼굴과 중앙의 빈 공간을 강조함.\n\n조명: 얼굴의 윤곽, 질감, 입체감을 살려주는 영화적(Cinematic) 조명.\n\n분위기: 강렬함, 세련됨, 신비로움, 감정을 자극하는 분위기.\n\n스타일: 하이퍼 리얼리즘, 파인 아트 초상화, HDR, 8K 초고해상도, 깊이감을 더하는 섬세한 그림자.", imageUrl: "images/22.png" },
            { id: 217, category: "2.지쿱AI대학교 1학년 2주차", title: "고대 유적 로고 (2-16)", content: "GCOOP 고대 유적 로고 생성 프롬프트\n\n고대 지하 동굴 또는 고고학적 유적지 내부를 배경으로 한 하이퍼 리얼리스틱 시네마틱 3D 로고 장면을 생성해 줘.\n\n중심 요소: 중앙에는 단단한 암석을 깎아 만든 거대한 \"GCOOP\" 로고가 배치되어야 함. 깊게 새겨진 각인, 날카로운 모서리, 사실적인 돌의 질감을 가진 기념비적이고 고대 유물 같은 느낌이어야 함. 로고 앞 바닥에는 돌로 조각된 카메라 필름 로고들이 흩어져 있거나 놓여 있음.\n\n환경적 디테일: 거친 동굴 벽, 흩어진 돌 파편, 바닥에 새겨진 문양들이 보이며, 배경에는 매달린 로프, 자루, 도구와 같은 미묘한 고고학적 요소들이 포함됨.\n\n조명 및 효과: 위나 옆에서 비추는 부드러운 황금빛의 따뜻하고 분위기 있는 조명을 사용하며, 사실적인 그림자를 통해 돌의 깊이감과 질감을 강조함. 시네마틱 라이팅, 볼류메트릭 광선(빛 갈라짐), 공기 중의 먼지 입자, 얕은 심도(아웃포커싱)를 적용하여 사실감을 극대화함.\n\n전체적인 분위기: 게임 스튜디오 인트로나 하이엔드 브랜드 리빌 영상처럼 신비롭고 웅장하며 고급스러운 느낌.\n\n기술 사양: 초고해상도, 포토리얼리스틱 3D 렌더링, 극적인 구도, 전문적인 게임 스타일 환경 디자인. 종횡비 1080*1350으로 생성.", imageUrl: "images/23.png" },
            { id: 218, category: "2.지쿱AI대학교 1학년 2주차", title: "캡틴 이미지 (이미지 전용)", content: "해당 이미지 파일은 프롬프트 없이 이미지만 다운로드 가능하도록 업로드", imageUrl: "images/22캡틴.jpg", downloadOnly: true },

            // 3주차
            { id: 301, category: "3.지쿱AI대학교 1학년 3주차", title: "포토부스 4x5 그리드 (3-1)", content: "흑백 포토부스 스타일의 4x5 표현 그리드로, 모든 20개 패널에 동일한 첨부한 이미지의 인물이 등장하며, 각 패널마다 뚜렷하게 다른 표정을 보여줍니다. 표정에는: 찡그린 행복한 미소, 강렬한 드라마틱 시선, 크게 벌린 입으로 웃는 모습, 지루한 휴식 얼굴, 슬픈 입술을 쭉 내민 표정, 손가락으로 장난스러운 악마 뿔, 혀를 내민 모습, 화난 연극적인 노려봄, 기울인 머리로 플러티한 윙크, 눈이 휘둥그레진 놀람, 가짜 드라마틱 비명, 장난스러운 미소, 혼란스러운 찡그린 눈썹, 눈을 찡그리며 우는 모습, 장난스러운 평화의 상징, 과장된 오리 얼굴이 포함됩니다. 주제는 모든 패널에서 일관된 정체성을 유지합니다. 직접적인 포토부스 플래시 조명으로 평평하고 고른 조명이 비추며, 모든 패널에서 머리와 어깨가 촘촘하게 프레이밍됩니다. 50mm 동등 렌즈로 촬영되었으며, 순수한 흑백으로 중간-높은 대비, 평평한 중성 회색 배경, 미세한 아날로그 필름 그레인 질감이 전체적으로 있습니다. 3:4 화면 비율, 초고해상도 컨택트 시트 미학.", imageUrl: "images/3-1.png" },
            { id: 302, category: "3.지쿱AI대학교 1학년 3주차", title: "예술가와 청룡 (3-2)", content: "\"아늑한 예술가 스튜디오 안의 영화 같은 판타지 장면. 페인트 얼룩이 있는 앞치마를 입은 첨부한 이미지의 인물이 이젤에 앉아, 공중에 붓을 들고 캔버스를 차분하게 바라보고 있다. 캔버스에서 웅장한 동양 스타일의 드래곤이 3차원으로 나타나며, 그 비늘은 깊은 청록색과 파란색으로 칠해져 있고, 갈기와 머리 주위에는 흐르는 불타는 주황색 불꽃이 있으며, 연기가 위로 감돌고 있다. 드래곤은 살아 있는 듯하면서도 예술적으로 보이며, 붓 터치와 페인트로 형성된 것처럼 보인다. 부드러운 자연광이 얇은 커튼이 있는 창문을 통해 들어와 나무 작업 공간에 흩어져 있는 붓, 페인트, 예술 용품이 비춰진다. 따뜻하고 사실적인 조명, 얕은 심도, 초고해상도 질감, 마법적 사실주의, 판타지 사실주의 스타일, 8k 품질, 매우 세밀한 묘사, 영화 같은 구성, 부드러운 색 보정, 기발하면서도 평화로운 분위기.\"", imageUrl: "images/3-2.png" },
            { id: 303, category: "3.지쿱AI대학교 1학년 3주차", title: "타임스 스퀘어 화보 (3-3)", content: "\"고급 패션 잡지 화보, 첨부한 이미지의 인물이 서서 카메라를 똑바로 바라보며, 화면 중앙에서 약간 고개를 돌리고, 주변에는 뉴욕 타임스 스퀘어를 빠르게 지나가는 흐릿한 인물 실루엣이 있습니다. 인물의 표정은 차분하고 냉철하며, 검은색 미니멀리즘 의상을 입고 있습니다. 배경은 타임스 스퀘어의 활기찬 조명과 광고판을 보여주며, 약간 추상적이고 밝아 그녀의 정지된 존재와 동적 흐림 사이의 대비를 강조합니다. 편집 스타일, 영화적 구도, 순수 예술 사진, 부드러운 잡지 질감, 고해상도.\"", imageUrl: "images/3-3.png" },
            { id: 304, category: "3.지쿱AI대학교 1학년 3주차", title: "전문 사진 음료 홍보 (3-4)", content: "\"전문 사진, 첨부한 이미지의 인물이 모델(참고 이미지), 카메라를 정면으로 바라보며, 아래에서 위로 촬영, 광각 렌즈 사용. 남성이 몸을 기울이며 가까이에서 카메라에 음료수 병을 보여주고, 한 손으로 병을 잡고 카메라 앞에 밀착. 병의 라벨과 방향이 곧게 유지되어 라벨이 선명하게 읽히도록. 그는 흰색 운동화를 신고 있으며, 한 발이 카메라 앞에 있음. 남성이 거리에서 서 있고, 젖은 아스팔트와 튀는 물방울이 아래에서 촬영됨. 선명한 색상, 영화 같은 조명, 빛이 뒤에서 모델의 얼굴에 비침. --v7 --ar 3:4 --style raw\"", imageUrl: "images/3-4.png" },
            { id: 305, category: "3.지쿱AI대학교 1학년 3주차", title: "인생 여정 콜라주 (3-5)", content: "\"강력한 영화급 콜라주로, 한 프레임 안에서 첨부한 이미지 인물의 완전한 인생 여정을 이야기합니다.\n이야기는 가장 왼쪽에서 시작되며, 부드럽게 빛나는 흑백 초음파 스캔 이미지가 미리 태어난 아기를 보여줍니다. 중앙으로 부드럽게 전환되며, 콜라주는 인생 단계들을 순차적으로 보여줍니다: 병원 천에 싸인 신생아, 비틀거리며 걷는 유아, 책가방을 멘 초등학생, 꿈으로 가득 찬 인물, 자신감 있게 일하는 젊은 인물, 힘과 지혜가 넘치는 성숙한 인물.\n가장 오른쪽에서 이야기는 인물의 노인 모습이 창가에 평화롭게 앉아 있는 모습으로 끝납니다. 은발이 따뜻한 석양 속에서 빛나며, 완성과 회상을 상징합니다.\n각 단계는 찢어진 종이 가장자리, 누출된 빛, 부드러운 운동 궤적, 떠오르는 기억, 시계 요소와 미세한 시간선으로 매끄럽게 연결됩니다.\n색상 그레이딩은 차가운 단색(출생)에서 생생한 따뜻한 톤(청춘)으로 전환되며, 결국 금빛 부드러운 색조(노년)로 귀결됩니다.\n극한의 감정, 시적, 영화적 서사, 얕은 심도, 실제 인물의 표정, 고세부 콜라주 구성, 상징적인 인생 여정, 영원하고 고무적인\"", imageUrl: "images/3-5.png" },
            { id: 306, category: "3.지쿱AI대학교 1학년 3주차", title: "불꽃 너머 시선 (3-6)", content: "{\n\"prompt\": \"기반 <사용자 첨부 이미지>, 첨부한 사진의 인물, 약간 헝클어진 머리, 입에 담배를 물고 아래에서 불꽃을 통해 바라보는 모습. 헝클어진 머리는 자연스럽게 약간의 웨이브가 있으며, 약간 헝클어졌지만 거칠지 않음—힘들이지 않은 헝클임, 생활감 있는 질감. 불꽃을 통해 아래를 바라보며 카메라를 응시하는 반쯤 감긴 눈빛. 냉담하고, 초연하며, 무관심한 표정, 담배는 입술에서 늘어져 있다. 타오르는 신문을 손에 들고 있으며, 하반신 얼굴만 보임—턱, 입술, 담배와 턱이 불꽃을 통해 보인다.\\n\\n검은색 정장 재킷, 어두운 정장. 《뉴욕 타임스》 신문이 앞에 있으며, 신문의 하단 가장자리와 불꽃이 극단적인 전경에 위치하고, 불꽃이 위로 타오르고 있다.\\n\\n전경 요소—카메라가 불꽃을 통과하여 촬영하며, 불꽃 부분이 주체의 하반신 얼굴 시야를 가리고 프레임을 형성한다. 불꽃은 카메라와 주체의 얼굴 사이에 위치하며, 카메라 앞에서 불꽃이 솟아오른다. 따뜻한 주황색과 금색의 불꽃, 전경은 약간 초점이 흐릿하다. 불꽃은 자연스러운 흐림/프레임을 형성하며, 관람자는 불꽃을 통해 턱, 입술, 담배를 볼 수 있다. 담배는 입술에서 늘어져 있고, 점화되어 있으며, 불꽃을 통해 보이고, 연기와 불빛이 섞인다.\\n\\n전경 불꽃을 통한 하반신 얼굴 클로즈업, 35mm f/1.8. 낮은 각도에서 신문 아래에서 수평으로 위로 불꽃을 통해 턱/입을 향해 촬영한다. 카메라가 불타는 신문 가장자리 뒤에 놓인 듯하며, 불꽃을 통해 촬영된다. 전경: 초점이 흐릿한 불꽃과 신문 가장자가 화면 하단/양쪽을 채운다; 중경: 턱, 입술, 담배가 선명하게 초점이 맞춰진다; 배경: 어두운 얼굴이 어둠 속으로 점점 사라진다. 얕은 심도—전경 불꽃이 약간 흐릿하고, 초점은 입술/턱 영역에 맞춰져 있다.\\n\\n단일 광원—오직 불꽃만 있다. 다른 광원은 없으며, 보조 조명도 없고, 환경광도 없다. 타오르는 신문의 불꽃만이 장면을 밝힌다. 불꽃은 얼굴 아래에서 위로 따뜻한 빛을 턱, 아래 입술, 코에 투사한다. 어둡고, 극적이며, 불빛의 명암 대비가 뚜렷하다. 순수한 검은색 환경, 얼굴은 완전히 어둠 속에서 떠오르며, 오직 아래의 불빛만이 비춘다.\\n\\n후지 ETERNA 스타일, 극도로 어둡고 언더 익스포즈, 불꽃은 화면에서 유일한 색상/빛이다. 순수한 검은 배경, 피부에 따뜻한 주황색 불빛, 다른 곳은 깊은 그림자. 전체 노출이 매우 어두워, 검은색이 압축된다.\\n\\n친밀하지만 위협적인 느낌, 불꽃을 통한 엿보는 듯한 시선, 어두운 여성의 힘.\"\n}", imageUrl: "images/3-6.png" },
            { id: 307, category: "3.지쿱AI대학교 1학년 3주차", title: "다이아몬드 교정기 (3-7)", content: "{\n\n\"prompt\": \"특写 스타일화 편집 사진, 거대한 열린 입/치아 구조 내부에 앉아 있는 첨부한 이미지의 인물을 보여줍니다; 입은 극적인 배경으로, 입술은 빛나고, 치아는 다이아몬드 장식의 치아 교정기를 착용하고 있으며, 양쪽은 엮인 머리띠로 감싸져 있습니다. 주체는 캐주얼 스트리트 의상을 입고 편안하게 앉아 있으며, 다리를 벌리고 있습니다. 낮은 각도에서 촬영되었고, 높은 대비, 하드 라이트 스튜디오 조명과 거울 같은 하이라이트가 있으며, 차가운 색조에 파란색이 섞이고 따뜻한 색상이 포인트로 사용되었습니다. 하단 중앙에 GCOOP 로고가 있습니다. 8K, 사진 수준의 편집 스타일.\"\n\n}", imageUrl: "images/3-7.png" },
            { id: 308, category: "3.지쿱AI대학교 1학년 3주차", title: "하이 앵글 인물 (3-8)", content: "업로드해주신 인물들을 대상으로 한 전문적인 스튜디오 인물 사진입니다. **하이 앵글(위에서 아래로 내려다보는 구도)**에서 촬영되었으며, 드라마틱한 스포트라이트 조명 아래 인물들의 얼굴이 밝게 빛납니다. 바닥에는 인물들을 중심으로 원형의 헤일로(광륜) 효과가 형성되어 있으며, 중심부가 가장 밝고 가장자리로 갈수록 서서히 어두워집니다. 깔끔하고 미니멀하며 인물에 집중된 구성입니다.", imageUrl: "images/3-8.jpg" },
            { id: 309, category: "3.지쿱AI대학교 1학년 3주차", title: "사바나와 아기 사자 (3-9)", content: "따뜻한 일몰이 내리는 사바나를 배경으로 한 초고화질(8K) 시네마틱 야생 동물 초상화. 첨부한 사진의 인물이 가벼운 마른 풀 질감이 느껴지는 무늬 없는 흰색 티셔츠를 입고, 어깨 위에 앉은 친근한 새끼 사자 옆에 안전하게 무릎을 굽히고 앉아 있는 모습. 옆에는 보호구역의 성체 사자가 그의 뺨을 부드럽게 맞대고 있음. 긴 렌즈가 장착된 소니(Sony) a9iii DSLR 카메라를 들고 있으며, 차분하고 집중된 분위기. 황금빛 아크바르 풀, 부드러운 먼지, 흐릿하게 처리된 아카시아 나무, 깊이 있는 시네마틱 조명.", imageUrl: "images/3-9.png" },
            { id: 310, category: "3.지쿱AI대학교 1학년 3주차", title: "보그 잡지 커버 (3-10)", content: "핵심 컨셉:\n\n업로드된 참조 이미지를 원본 소스로 사용하여, 모델의 이목구비 특징을 100% 유지한 실사 스타일의 보그 잡지 커버 패션 포트레이트를 생성합니다. 첨부한 이미지 인물의 본연의 아름다움을 간직한 채 자신감 넘치는 포즈를 취하고 있습니다.\n\n\n모델의 표정 및 포즈:\n\n왼쪽 눈을 윙크하며 장난스럽게 입술을 내밀고 있습니다.\n양손을 높이 들어 볼 옆에서 하트 모양을 만들고 있습니다.\n\n배경 및 상황:\n\n마치 파파라치와 사진작가들이 사방에서 인물을 찍고 있는 듯, 수많은 DSLR 카메라와 스마트폰에 둘러싸여 있습니다.\n일부 스마트폰 화면에는 인물의 라이브 피드가 표시되고 있습니다.\n\n메이크업 및 스타일링:\n첨부한 이미지가 남자일 경우, 인물을 가장 잘 생기게 보이게 할 수 있는 하이라이트 효과\n첨부한 이미지가 여자일 경우, 결점 없이 빛나는 피부, 모델과 같은 헤어와 메이크업, 부드러운 볼터치와 적절한 하이라이터 효과.\n\n\n의상 및 액세서리:\n첨부한 이미지가 남자일 경우, 프라다 턱시도\n첨부한 이미지가 여자일 경우, 우아하고 심플한 시상식 의상, 의상에 맞는 고급스러운 패션 주얼리 착용.\n\n\n촬영 스타일 및 기술적 사양:\n구도: 클로즈업에서 상반신까지 이어지는 패션 포트레이트, 보그 잡지 편집 스타일, 상단에 크고 눈에 띄는 로고 배치.\n조명: 시네마틱한 전문 스튜디오 조명, 부드러운 HDR 배경, 얕은 심도(아웃포커싱).\n렌즈: 전문 SLR 스타일, 85mm 렌즈 느낌, f/1.8 조리개값, 날카로운 초점과 부드러운 배경 흐림.\n품질: 극도로 세밀한 피부 질감, 울트라 디테일, 8K 해상도.\n\n분위기:\n\n장난스러우면서도 럭셔리한 느낌, 하이엔드 패션 및 뷰티 화보, AI가 만든 티가 나지 않는 전문 패션 사진작가가 촬영한 듯한 자연스럽고 사실적인 분위기.", imageUrl: "images/3-10.png" },

            // 4주차
            { id: 401, category: "4.지쿱AI대학교 1학년 4주차", title: "네온 라이트 스트립 (4-1)", content: "헝클어진 질감의 머리 스타일을 한 젊은 남성의 시네마틱 스튜디오 초상화, 블랙 터틀넥 착용, 중앙 구도, 어두운 미니멀 배경, 드라마틱한 로우키 조명, 눈을 가로지르는 수평의 레드 네온 라이트 스트립, 얼굴 하단을 덮는 강렬한 대비의 그림자, 강렬한 시선, 무드 있는 분위기, 사이버펑크 에스테틱, 초고화질, 선명한 포커스, 85mm 렌즈, 얕은 피사체 심도, 높은 디테일, 에디토리얼 포토그래피 스타일.", imageUrl: "images/4-1.jpg" },
            { id: 402, category: "4.지쿱AI대학교 1학년 4주차", title: "몽환적 셀카 (4-2)", content: "{\n\n  \"prompt_metadata\": {\n\n    \"version\": \"4.0\",\n\n    \"style\": \"초현실적인 몽환적인 클로즈업 셀카\",\n\n    \"aspect_ratio\": \"9:16\",\n\n    \"resolution\": \"8k RAW\"\n\n  },\n\n\n\n  \"reference_rules\": {\n\n    \"face_source\": \"업로드된 참조 이미지를 정확한 신원으로 사용\",\n\n    \"face_integrity\": \"얼굴 구조, 눈, 입술, 비율 변경 없음\",\n\n    \"hair_color_rule\": \"머리 색깔은 참조 이미지와 정확히 일치해야 함\"\n\n  },\n\n\n\n  \"subject\": {\n\n    \"pose\": {\n\n      \"type\": \"극단적인 클로즈업 셀카\",\n\n      \"orientation\": \"카메라가 시계 방향으로 약간 회전됨\",\n\n      \"head_position\": \"옆으로 기울어져 오른손에 기대어 있음\",\n\n      \"face_angle\": \"3/4 각도, 카메라를 향해 약간 아래로\",\n\n      \"distance\": \"렌즈에 매우 가까이, 프레임 대부분을 채움\"\n\n    },\n\n\n\n    \"expression\": {\n\n      \"type\": \"부드러운 입술 다문 삐죽거림\",\n\n      \"eyes\": \"편안하고 약간 무거운 눈꺼풀\",\n\n      \"emotion\": \"차분하고 친밀하며 몽환적임\"\n\n    },\n\n\n\n    \"appearance\": {\n\n      \"skin\": {\n\n        \"texture\": \"자연스러운 모공이지만 빛 확산으로 부드러워짐\",\n\n        \"tone\": \"따뜻하게 상기된 뺨과 코\",\n\n        \"finish\": \"약간의 하이라이트 블룸으로 빛나는\"\n\n      },\n\n\n\n      \"hair\": {\n\n        \"style\": \"느슨하고 약간 헝클어진\",\n\n        \"placement\": \"이마를 가로질러 떨어지며 한쪽 눈을 부분적으로 가림\",\n\n        \"strands\": \"얼굴에 보이는 가는 머리카락\",\n\n        \"color\": \"참조 이미지와 동일\"\n\n      }\n\n    },\n\n\n\n    \"hand_pose\": {\n\n      \"position\": \"오른손으로 턱을 받치고 있음\",\n\n      \"fingers\": \"느슨하게 말려 있고 부드러운 자연스러운 자세\",\n\n      \"contact\": \"뺨이 손바닥에 부드럽게 눌려 있음\"\n\n    }\n\n  },\n\n\n\n  \"environment\": {\n\n    \"setting\": \"실내 침실\",\n\n\n\n    \"background\": {\n\n      \"bed_frame\": \"피사체 뒤에 밝은 따뜻한 나무 헤드보드\",\n\n      \"wall\": \"크림색 또는 베이지색 벽\",\n\n      \"decor\": \"작은 액자 그림이 약간 위에 보임\"\n\n    }\n\n  },\n\n\n\n  \"lighting\": {\n\n    \"primary_source\": {\n\n      \"type\": \"따뜻한 실내 주변광\",\n\n      \"position\": \"카메라 위쪽 및 약간 뒤쪽\",\n\n      \"color_temperature\": \"3200K 따뜻한 노란색\",\n\n      \"intensity\": \"중간 부드러움\"\n\n    },\n\n\n\n    \"secondary_effect\": {\n\n      \"type\": \"확산 블룸\",\n\n      \"effect\": \"빛이 얼굴을 감싸고 가장자리를 부드럽게 함\",\n\n      \"highlight_behavior\": \"이마, 뺨, 코에 약간의 과노출\"\n\n    },\n\n\n\n    \"shadow_behavior\": {\n\n      \"style\": \"매우 부드럽고 거친 그림자가 거의 없음\",\n\n      \"contrast\": \"낮은 대비, 흐릿한 느낌\"\n\n    }\n\n  },\n\n\n\n  \"camera\": {\n\n    \"device\": \"스마트폰 전면 카메라\",\n\n    \"lens\": \"26mm 상당\",\n\n    \"aperture_simulation\": \"f/2.0\",\n\n    \"focus\": \"눈에 선명하게 초점, 가장자리는 부드럽게 흐려짐\",\n\n    \"angle\": \"손으로 들고 약간 기울어진 프레임\",\n\n    \"distance\": \"팔 길이이지만 얼굴을 타이트하게 프레임하기 위해 확대/잘림\"\n\n  },\n\n\n\n  \"color_grading\": {\n\n    \"tone\": \"따뜻한 황금색\",\n\n    \"contrast\": \"낮음\",\n\n    \"saturation\": \"약간 채도가 낮은 피부 톤\",\n\n    \"effect\": \"몽환적인 안개, 약간의 빛 필터\"\n\n  },\n\n\n\n  \"render_constraints\": {\n\n    \"must_have\": [\n\n      \"부드러운 빛 효과\",\n\n      \"\"\n\n    ]\n\n  }\n\n}", imageUrl: "images/4-2.jpg" },
            { id: 403, category: "4.지쿱AI대학교 1학년 4주차", title: "영화적 흑백 초상화 (4-3)", content: "내 실제 얼굴을 그대로 유지한 영화 같은 흑백 초상화. 나는 매끄러운 벽에 편안하게 기대어 옆모습을 보이고 있다. 나의 자세는 편안하면서도 우아하다. 머리는 살짝 뒤로 젖혀져 있고, 턱은 들려 있으며, 눈은 고요한 성찰의 순간에 감겨 있다. 왼팔은 자연스럽게 늘어져 있고, 오른팔은 부드럽게 구부러져 허리춤에 투명한 유리잔을 들고 있다.", imageUrl: "images/4-3.jpg" },
            { id: 404, category: "4.지쿱AI대학교 1학년 4주차", title: "라이프스타일 콜라주 1 (4-4)", content: "json\n{\n  \"task\": \"four_grid_lifestyle_collage\",\n  \"reference_face\": {\n    \"identity_lock\": true,\n    \"face_match_accuracy\": \"100_percent_identical\",\n    \"notes\": \"얼굴 변화는 허용되지 않습니다. 정확한 얼굴 구조, 비율, 눈 모양, 코, 입술, 눈썹, 피부 질감을 유지하세요.\"\n  },\n  \"output\": {\n    \"type\": \"single_image\",\n    \"layout\": \"2x2_grid\",\n    \"resolution\": \"ultra_high_resolution\",\n    \"realism\": \"natural_iphone_photography\",\n    \"quality\": \"social_media_lifestyle_collage\",\n    \"retouching\": \"minimal_skin_smoothing_only\"\n  },\n  \"subject\": {\n    \"gender\": \"female\",\n    \"age_range\": \"early_to_mid_20s\",\n    \"ethnicity\": \"asian\",\n    \"skin\": {\n      \"tone\": \"fair\",\n      \"texture\": \"natural_with_soft_glow\",\n      \"makeup\": \"light_natural_makeup_with_soft_pink_blush\"\n    },\n    \"hair\": {\n      \"color\": \"dark_brown\",\n      \"style\": \"as in picture\"\n    },\n    \"expression\": \"calm_focused_fresh_morning_vibe\"\n    {argument name=\"subject ethnicity\" default=\"asian\"}\n  },\n  \"wardrobe\": {\n    \"outfit\": \"fitted_black_full_sleeve_activewear_top_and_black_joggers\",\n    \"style\": \"clean_minimal_fitness_look\",\n    \"coverage\": \"fully_modest_no_exposed_midriff\",\n    \"accessories\": [\n      \"smartwatch_on_wrist\",\n      \"neutral_phone_case\"\n    ]\n  },\n  \"grid_breakdown\": {\n    \"top_left\": {\n      \"scene\": \"hand_holding_matte_blue_water_bottle\",\n      \"shot_type\": \"close_up_object_shot\",\n      \"focus\": \"hydration_and_fitness_routine\"\n    },\n    \"top_right\": {\n      \"scene\": \"selfie_half_body\",\n      \"camera_angle\": \"slightly_high_angle\",\n      \"pose\": \"relaxed_morning_selfie\",\n      \"expression\": \"soft_smile\"\n    },\n    \"bottom_left\": {\n      \"scene\": \"mirror_selfie_full_upper_body\",\n      \"camera\": \"iphone_front_camera\",\n      \"pose\" anding_straight\",\n      \"composition\": \"no_extreme_angles\"\n    },\n    \"bottom_right\": {\n      \"scene\": \"smartwatch_fitness_stats_close_up\",\n      \"details\": \"workout_time_calories_heart_rate_visible\",\n      \"style\": \"authentic_post_workout_capture\"\n    }\n  },\n  \"environment\": {\n    \"setting\": \"indoor_home_gym_or_bedroom\",\n    \"lighting\": \"soft_morning_natural_light\",\n    \"color_palette\": \"neutral_black_beige_soft_blue\",\n    \"mood\": \"productive_calm_morning_energy\"\n  },\n  \"style_notes\": {\n    \"aesthetic\": \"clean_girl_fitness_lifestyle\",\n    \"vibe\": \"morning_routine_realism\",\n    \"camera_effects\": \"slight_film_softness_no_heavy_filters\",\n    \"background\": \"simple_uncluttered\"\n  },\n  \"restrictions\": {\n    \"no_face_alteration\": true,\n    \"no_body_distortion\": true,\n    \"no_sexualized_pose\": true,\n    \"no_text_overlay\": true,\n    \"no_logos_or_watermarks\": true\n  }\n}", imageUrl: "images/4-5.jpg" },
            { id: 406, category: "4.지쿱AI대학교 1학년 4주차", title: "엣지 트렌드세터 (4-6)", content: "{\n  \"image_prompt\": {\n    \"meta\": {\n      \"aspect_ratio\": \"9:16\",\n      \"style\": \"0.5배율 초광각 거울 셀카, 강한 플래시\"\n    },\n    \"subject\": {\n      \"description\": \"자신감 있고 엣지 있는 분위기의 22세 트렌드세터\",\n      \"face\": \"거울 속 자신의 휴대폰 화면을 보며 입술을 살짝 깨물고 있음, 짙은 윙 아이라이너, 유혹적인 표정\",\n      \"skin\": \"휴대폰 플래시로 인한 선명한 하이라이트, 반짝이는 피부 질감, 빛나는 쇄골\",\n      \"hair\": \"매끈한 '웻 룩' 포니테일, 이마에 완벽하게 스타일링된 잔머리\",\n      \"pose\": \"거울 엘리베이터 바닥에 앉아 다리를 거울 쪽으로 뻗고 있음 (극단적인 0.5배율 왜곡), 휴대폰을 높이 들고 있음\",\n      \"outfit\": \"블랙 비닐/라텍스 보디수트, 한쪽 어깨에서 흘러내리는 오버사이즈 가죽 재킷, 두툼한 실버 체인\"\n    },\n    \"environment\": {\n      \"location\": \"거울 벽과 긁힌 금속으로 된 현대적인 엘리베이터\",\n      \"background_elements\": [\n        \"멀리 희미하게 사라지는 피사체의 무한한 반영\",\n        \"구석에서 빛나는 빨간색 LED 층수 'B2'\",\n        \"거울 유리에 미묘하게 남은 손자국과 지문\"\n      ]\n    },\n    \"lighting\": {\n      \"type\": \"직접적이고 강렬한 스마트폰 플래시 + 차가운 천장 LED\",\n      \"characteristics\": [\n        \"뒷벽에 드리워진 짙은 검은 그림자\",\n        \"비닐 소재에 반사되는 스페큘러 하이라이트 (액체 같은 느낌)\",\n        \"광각 렌즈로 인한 비네팅 효과\"\n      ]\n    },\n    \"photography_style\": {\n      \"style\": \"파파라치 스타일의 '나이트 아웃' 덤프\",\n      \"camera_look\": \"0.5배율 왜곡과 높은 대비를 가진 스마트폰 카메라\",\n      \"imperfections\": \"거울의 작은 먼지 얼룩, 플래시로 인한 렌즈 플레어, 어두운 영역의 디지털 그레인\",\n      \"mood\": \"반항적이고, 강력하며, 유혹적이고, 짜릿한\"\n    }\n  }\n}", imageUrl: "images/4-6.jpg" },
            { id: 407, category: "4.지쿱AI대학교 1학년 4주차", title: "브이로그 스타일 (4-7)", content: "[영상생성프롬프트]\n정면을 향한 비디오 스타일의 샷을 만듭니다. 카메라는 얼굴 높이에 고정되어 피사체 바로 앞에 위치합니다. 피사체는 자세와 구도를 보아 앉아 있는 것으로 보입니다.\n\n구도는 단순하고 안정적이며, 극적인 앵글이나 눈에 띄는 카메라 움직임은 없습니다. 조명은 [UGC 스타일 샷을 고려한 사실적인 조명 추가]입니다. 얼굴은 선명하게 보입니다.\n\n피사체의 표정은 차분하고 편안하며, 자연스럽고 희미한 미소를 띠고 있습니다. 마치 브이로그를 위해 카메라에 대고 말을 시작하려는 듯한 모습입니다. 이미지 품질은 필터, 보정 효과 또는 인위적인 선명화가 적용되지 않은, 실내 야간 고품질 비디오 샷을 반영합니다.\n\n공간은 개인적인 느낌을 줍니다. 보케는 인위적인 심도 효과가 아닌 카메라의 한계로 인한 것입니다. 전체적인 분위기는 따뜻하고 밝으며 친밀하여, 피사체가 말을 시작하기 직전의 실제 브이로그 순간을 연상시킵니다.\n\n여성의 대사는 \"오늘의 지쿱 하이라이트는 [디엘리서 브라운]!\"이며, 첨부한 제품의 이미지를 만지면서 부드러운 어조로 말합니다. 마지막에는 미소를 짓습니다.\n\nBGM: 브이로그 스타일의 패션 분위기에 어울리는 편안한 음악이 재생됩니다.", imageUrl: "images/4-7.jpg" },
            { id: 408, category: "4.지쿱AI대학교 1학년 4주차", title: "디엘릭서 단독 (영상용)", content: "5-4.jpg 파일은 프롬프트 없이 이미지만 다운로드할수있도록 설정해줘", imageUrl: "images/5-4.jpg", downloadOnly: true },
            { id: 409, category: "4.지쿱AI대학교 1학년 4주차", title: "GCOOP AI 로고 인트로 (4-8)", content: "[영상프롬프트]\n모션 프롬프트: 카메라: 단일 연속 촬영. 카메라가 환경을 가로질러 직선으로 빠르게 이동합니다. 높은 곳에서 시작하여 즉시 장면으로 급강하합니다. 카메라는 좁은 간격으로 장애물 사이를 누비며 빠르게 뱅킹 턴을 하고, 신속하게 회피하며, 주변 환경은 주변부 흐림으로 빠르게 지나갑니다. 빛은 빔과 그림자를 통해 빠르게 깜빡입니다. 피사체가 시야에 들어오면서 최종 접근 속도가 급격히 줄어들고, 속도는 차분하고 안정적인 호버링으로 전환됩니다. 카메라는 미묘한 드리프트와 함께 로우 앵글 미디엄 샷으로 고정됩니다. 액션: 위에서 시작하여 환경 속으로 급강하합니다. 주변은 색상과 빛줄기의 흐림으로 변합니다. 장애물들이 양쪽으로 휙 지나가고, 입자들이 프레임을 가로질러 흩날립니다. 볼류메트릭 광선이 번쩍이며 지나갑니다. 피사체가 앞에 나타나면 속도가 갑자기 떨어지고, 혼란이 가라앉으며, 카메라는 마지막 거리를 떠다닙니다. 최종 프레임은 빛나고 정지된 피사체에 고정됩니다. 환경과 피사체 외에는 프레임에 아무것도 보이지 않습니다. 스타일: 스릴 넘치는 고속 카메라 러시. 긴급하고 짜릿합니다. 속도를 강조하는 모션 블러와 함께 빠른 빛-그림자 전환. 광란의 여정과 차분한 도착 사이의 대비가 만족스러운 효과를 만듭니다. 정지된 파사체 안에는 GCOOP AI라는 글짜가 나타납니다", imageUrl: "images/4-8.jpg" },

            { id: 501, category: "5.지쿱AI대학교 일일과제", title: "1학년 1회차 과제", content: "[📢 지쿱 AI 네트워크마케팅 1학년 1회차 : AI 포스터 영상 제작 및 인스타그램 업로드 안내]\n|\n프롬프트 숙제 1탄\n1. 이미지 프롬프트를 활용해서 여러분의 이미지가 들어간 포스터를 만들고, 이 방에 공유하세요! 만든 포스터는 외부에 적극적으로 홍보하세요!\n   \n[프롬프트] \n\nA professional recruitment poster for \"GCOOP AI University\". Top center features bold, large 3D metallic text in white and gold saying \"지쿱 AI 대학교 입학 하세요!\". Below it, smaller white text reads \"초보자도 가능한 AI 자동화 인세소득 시스템 구축 전격 공개\". In the middle, 첨부하는 이미지의 인물을 배치해주고 전문적으로 보이게 만들어줘. 비지니스 슈트를 입혀주고, 전문성과 자신감이 드러나도록 해줘. Behind him, a high-tech futuristic background with glowing cyan and purple digital data streams and \"AI\" icons. At bottom, a clean semi-transparent box contains lecture details in yellow and white text: \"신청방법 : 저에게 DM이나 카톡 주세요!\", \"장소: 지쿱 서울 가산 캠퍼스\", . High-quality graphic design, cinematic lighting, 8k resolution. 이미지 사이즈를 4:5 사이즈로 만들어줘\n\n\n2. 아래 드리는 동영상 프롬프트를 활용해서 여러분들의 영상을 2개 만들어보세요! 하나는 프롬프트를 그대로 복사해서 올리시고 하나는 프롬프트에서 여러분들이 함께 목욕 하고 싶은 동물로 바꾸어 만들어보세요!\n\n[프롬프트] \n\n광각 하이 앵글 샷으로 촬영된 이 장면은 화려한 1970년대 스타일의 욕실 안, 커다란 자쿠지에서 함께 목욕을 즐기는 한 한국인 남성과 쥐 떼의 모습을 포착합니다. 16mm 필름으로 촬영된 듯한 질감은 눈에 띄는 입자감(grain)과 부드러운 색조를 띠며, 차가운 형광등 조명 아래 연출됩니다.\n\n자쿠지는 두꺼운 샴푸 거품으로 가득 차 있으며, 거품은 남성의 어깨와 그를 둘러싼 작은 쥐들을 부분적으로 덮고 있습니다. 욕실 전체는 대리석 카운터탑, 파스텔톤 타일, 금빛 수도꼭지, 그리고 거울로 된 벽면 등 복고풍의 70년대 인테리어로 꾸며져 있습니다.\n\n남성은 욕조에 기댄 채 평온한 표정을 짓고 있으며, 쥐들은 즐겁게 물을 튀기거나 몸을 단장합니다. 몇몇 쥐들은 욕조 가장자리에 앉아 있고, 다른 쥐들은 장난스럽게 거품 속으로 미끄러져 들어갑니다. 고정된 오버헤드 카메라는 럭셔리함과 황당함이 공존하는 초현실적인 광경을 만들어냅니다. 조명은 전체 장면에 부드러운 청록색 반사광을 드리우며, 화려함과 기묘함이 뒤섞인 몽환적인 레트로 분위기를 완성합니다.\n\n개인 인스타그램 개설 및 영상 올리기 📱 영상을 만드셨다면, 이제 세상에 보여줄 차례입니다!\n필수 시청! 계정 만들기: 인스타그램이 처음이신 분들은 아래 가이드 영상을 참고해 주세요.", imageUrl: "images/5-1.png" },
            { id: 502, category: "5.지쿱AI대학교 일일과제", title: "1학년 2회차 과제", content: "[📢 지쿱 AI 네트워크마케팅 1학년 2회차 : AI 포스터 영상 제작 및 인스타그램 업로드 안내]\n안녕하세요, 여러분! 😊\n어제 정성껏 만드신 포스터를 활용해, 이번에는 '말하는 AI 영상'을 만들고 인스타그램에 직접 올려보는 시간을 갖겠습니다.\n\n👇\n1️.어제 만든 포스터로 AI 영상 만들기 🎬\n어제 완성한 포스터 속 인물이 실제로 말을 하는 영상을 만듭니다.\n어제 만든 이미지를 첨부하시고 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요.\n[영문 프롬프트]\nA 9:16 vertical high-definition video based strictly on the uploaded poster. The subject speaks the Korean sentence 'AI로 부자되는 길,  직쿠웁 AI 대학교에 입팍카세요~' with precise Korean lip-sync.\n[PRIMARY DIRECTIVE: IMMUTABLE TEXT BACKGROUND] All original text, typography, and logos present in the input poster must be treated as a separate, completely frozen graphical layer. There must be ZERO motion, warping, morphing, or shimmering applied to any existing letters. The background pixels containing text must remain absolutely locked and identical to the source image throughout the entire video.\n[MOTION ISOLATION] Motion is permitted ONLY restricted to the lower half of the subject's face (mouth, jaw, lips) to achieve speech. Keep overall head movement very minimal to prevent distorting the background.\n[NO NEW ELEMENTS] Do not generate any new subtitles, captions, or overlays.\"\n\n2. 개인 인스타그램 개설 및 영상 올리기 📱 영상을 만드셨다면, 이제 세상에 보여줄 차례입니다!\n필수 시청! 계정 만들기: 인스타그램이 처음이신 분들은 아래 가이드 영상을 참고해 주세요.\n📺 인스타그램 설치부터 가입까지 완벽 가이드 [01:28]\n영상 업로드: 본인이 만든 영상을 '릴스(Reels)'나 '게시물'로 올려주세요. [13:05]", imageUrl: null },
            { id: 503, category: "5.지쿱AI대학교 일일과제", title: "1학년 3회차 과제", content: "[📢 지쿱 AI 네트워크마케팅 1학년 3회차 : AI 포스터 영상 제작 및 인스타그램 업로드 안내]\n👇\n1️.이미지 제작하기 🎬\n아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. 아래의 프롬프트를 넣어서 생성해보고, 완료되면, 지쿱과 관련된 다양한 텍스트를 넣어서 이미지를 3장 이상 더 만들어 주세요 (예 : 지쿱 알라븅, We are GCOOPER 등)\n[한글 프롬프트]\n9:16 사이즈\n스마트폰이 테이블에 놓여져있고 AI스럽게 스마트폰에서 빛이 밖으로 은은히 비춰서 나오면서 '지쿱 AI 대학교' 버튼이 입체화 되서 글씨가 공중에 떠있는 이미지를 생성해줘\n2. 만들어진 이미지로 영상 만들기\n만들어진 이미지를 첨부하고 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요\n[한글 프롬프트]\n멋진 영상 만들어줘. 소리도 넣어서 만들어줘\n3. 개인 인스타그램 개설 및 영상 올리기 📱 영상을 만드셨다면, 이제 세상에 보여줄 차례입니다!\n필수 시청! 계정 만들기: 인스타그램이 처음이신 분들은 아래 가이드 영상을 참고해 주세요.\n📺 인스타그램 설치부터 가입까지 완벽 가이드 [01:28]\n영상 업로드: 본인이 만든 영상을 '릴스(Reels)'나 '게시물'로 올려주세요. [13:05]", imageUrl: null },
            { id: 504, category: "5.지쿱AI대학교 일일과제", title: "1학년 4회차 과제", content: "[📢 지쿱 AI 네트워크마케팅 1학년 4회차 : 지쿱 디엘릭서 브라운 영상 제작 및 인스타그램 업로드 안내]\n👇\n미션 1. 이미지 제작하기 🎬\n1. 여러분들의 사진과 첨부해드리는 디엘릭서 브라운 사진을 제미나이에 업로드해주세요! \n2. 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n[한글 프롬프트]\n첫 번째 첨부한 이미지의 인물이 두 번째 첨부한 이미지의 제품을 들고 있는 사진을 만들어줘\n2. 만들어진 이미지로 영상 만들기\n만들어진 이미지를 첨부하고 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요\n[한글 프롬프트]\n광고 영상을 만들어줘. 사진 속의 인물이 한국어로 제품을 홍보해. \"식사전 삼십분, 소화효소의 끝판왕, 디엘릭서 브라운 꼭챙겨드세요\"\n3. 개인 인스타그램 개설 및 영상 올리기 📱 영상을 만드셨다면, 이제 세상에 보여줄 차례입니다!\n필수 시청! 계정 만들기: 인스타그램이 처음이신 분들은 아래 가이드 영상을 참고해 주세요.\n📺 인스타그램 설치부터 가입까지 완벽 가이드 [01:28]\n영상 업로드: 본인이 만든 영상을 '릴스(Reels)'나 '게시물'로 올려주세요. [13:05]", imageUrl: "images/5-4.jpg" },
            { id: 505, category: "5.지쿱AI대학교 일일과제", title: "1학년 5회차 과제", content: "📢 지쿱 AI 네트워크마케팅 1학년 5회차 : 텔로메라 화장품 영상 제작 및 인스타그램 업로드 안내]\n👇\n미션 1. 이미지 제작하기 🎬\n1. 여러분들의 사진과 첨부해드리는 텔로메라 사진을 제미나이에 업로드해주세요! \n2. 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n   \n이미지 비율 : 9:16 사이즈\n\n[대상 및 동작] 업로드된 사진 속 인물의 얼굴 특징과 따뜻한 표정을 그대로 유지한 고화질 세로형 포트레이트(9:16). 그녀는 업로드된 참고 사진 속 특정 제품을 두 손으로 소중하게 감싸 쥐고, 부드럽고 친근한 미소를 지으며 카메라를 향해 제품을 보여주고 있다.\n\n[시각적 전략] \"새로운 시작의 첫 빛(The First Light Intro)\" 컨셉을 연출한다. 배경은 햇살이 가득 들어오는 미니멀한 화장대 공간이다. 창가에서 들어오는 부드러운 아침 황금빛 조명이 그녀의 얼굴과 제품을 비추며, 밝고 희망차고 깨끗한 분위기를 조성한다.\n\n[제품 디테일] 제품은 참고 사진에 있는 병의 형태, 보라색과 로즈 골드 배색, 라벨 디자인을 엄격하게 일치시켜야 한다. 금속 및 플라스틱 표면에는 사실적인 빛 반사가 표현되어야 한다.\n\n[기술 사양] Sony A7R V로 촬영, 50mm 렌즈, f/1.8, ISO 100. 초고화질 디테일: 빛나는 피부 질감, 모공, 한 올 한 올 살아있는 머리카락, 자연스러운 손가락과 손등의 질감. 하이키 조명(High-key lighting), 배경이 아름답게 흐려진 얕은 피사체 심도. 8k 해상도, 영화적 품질, 극사실주의.\n2. 만들어진 이미지로 영상 만들기\n만들어진 이미지를 첨부하고 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요\n[한글 프롬프트]\n[주제 및 동작] 참조 이미지 속 인물이 등장하는 8초 분량의 시네마틱 영상. 인물이 \"텔로메라 세럼\" 병을 한손으로 가볍게 쥐고, 아침 햇살을 받을 수 있도록 부드럽게 기울임. 카메라를 정면으로 응시하며 따뜻하고 화사한 미소와 함께 \"시간을 되돌리는 투명한 광채, 이제 피부 깊숙이 직접 느껴보세요. 내 피부의 새로운 시작, 텔로메라 세럼.\"라고 말함. 입술 움직임은 대사와 완벽하게 일치하며 자연스러워야 함.\n\n[역동성 및 카메라 워킹] 카메라는 인물의 얼굴과 제품을 향해 천천히 우아하게 줌인(Zoom-in)함. 미소 지을 때 눈가에 살짝 생기는 주름 등 미세한 표정 변화가 드러남. 세럼 병을 움직일 때 보라색 메탈릭 표면과 로즈골드 캡에 실제와 같은 빛 반사(Glints)가 나타남.\n\n[환경 및 조명] 창문을 통해 부드러운 아침 황금빛(Golden Hour) 조명이 들어오는 밝고 미니멀한 화장대 공간. 빛줄기 속에서 떠다니는 미세한 먼지 입자가 보여 공간감과 사실감을 더함. 배경은 부드럽고 몽글몽글한 보케(Bokeh) 효과로 처리됨.\n\n[기술적 사양] 8K 해상도, 60fps, 극사실주의(Photorealistic), 하이엔드 광고 미학. 모공이 보이는 투명한 피부 질감, 부드럽게 흔들리는 머리카락 한 올 한 올 묘사. 색감은 생동감 있으면서도 자연스러우며 텔로메라 세럼의 프리미엄 이미지를 강조함.", imageUrl: "images/5-5.jpg" },
            { id: 508, category: "5.지쿱AI대학교 일일과제", title: "1학년 8회차 과제", content: "오늘 드리는 숙제는 인스타그램에 올리시면 안됩니다. 만드시고 이 방에만 공유 해주세요! \n\n[📢 지쿱 AI 네트워크마케팅 1학년 8회차 : 피카츄 인물 포스터 제작]\n👇\n\n미션 1. 이미지 제작하기 🎬\n1. 여러분들의 사진과 아래의 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n   \n   \n[프롬프트]\n핵심 컨셉:\n첨부하는 이미지의 원래 얼굴을 완벽하게 보존하며 스타일화나 변형이 전혀 없는 하이퍼 리얼리스틱 포토리얼리스틱 이미지.\n모델 및 의상:\n\n인물: 첨부하는 이미지의 자신감 넘치는 표정의 인물. 생동감 있고 밝게 에너지를 풍기며 피카츄와 장난스럽게 상호작용함.\n의상: 무광 블랙의 고급스러운 선글라스, 풍부한 짜임이 돋보이는 일렉트릭 옐로우 니트 스웨터, 깔끔한 핏의 블랙 하이웨이스트 청바지, 블랙 & 화이트 하이탑 스니커즈 착용.\n디테일: 선글라스에 은은한 스튜디오 반사광이 맺혀 있으며 전체적인 룩에 자연스럽게 어우러짐.\n피카츄 묘사:\n\n거대한 3D 포토리얼리스틱 피카츄. 사실적인 털의 질감과 부드러운 조명이 적용됨.\n첨부하는 이미지의 인물이 팔 아래에서 활기차고 쾌활한 모습으로 인물를 올려다보며 미소 짓고 있음.\n배경 및 기술 사양:\n\n배경: 매끄러운 그라데이션과 깊이감이 느껴지는 선명한 노란색 스튜디오 배경.\n마무리: 대담하고 즐거운 분위기의 하이엔드 잡지 화보(Editorial) 스타일. 날카로운 초점과 자연스러운 색상 균형.\n2. 만들어진 이미지로 영상 만들기\n만들어진 이미지를 첨부하고 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요\n[프롬프트]\n\n첨부한 이미지를 기반으로 광고 영상을 만들어줘! 한글로 대사로 '제가 제일 좋아하는 피카츄! 사랑해요!'", imageUrl: null },
            { id: 511, category: "5.지쿱AI대학교 일일과제", title: "1학년 11회차 과제", content: "오늘 드리는 숙제는 인스타그램에 올리시면 안됩니다. 만드시고 이 방에만 공유 해주세요! \n\n[📢 지쿱 AI 네트워크마케팅 1학년 11회차 : 하이앵글 인물 포스터 및 인스타그램 업로드 안내]\n👇\n\n미션 1. 이미지 제작하기 🎬\n1. 지난 토요일에 드린 하이앵글 프롬프트를 활용해서 광고를 만들어보세요! \n2. 여러분들의 사진과 첨부드리는 제품 사진 5개를 함께 업로드하고 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n\n\n[프롬프트]\n\n\n**【참고 사진 인물】**을 기반으로 합니다. 이 작품은 LOMO LC-A 스타일의 고화질 사진입니다. 하이 앵글(High angle shot) 시점을 채택하여, 시선은 첨부 사진 인물에게 집중됩니다.\n\n인물은 {argument name=\"服装\" default=\"검은색 긴 트렌치코트\"}를 입고 있으며, 얼굴과 분위기는 **【참고 사진 인물】**과 완벽하게 일치합니다. 두번째, 세번째, 네번째, 다섯번째, 혹은 여섯번째 첨부한 제품의 사진은 바닥을 가득 메운 수많은 흑백 패션 광고판 위에 서 있습니다.\n\n하이 앵글 시점 덕분에 바닥에 깔린 모든 광고판 속 제품들 또한 각기 다른 잡지의 화보임을 알 수 있으며, 마치 시선은 두번째, 세번째, 네번째, 다섯번째, 혹은 여섯번째 첨부한 제품 의 수많은 분신들 위에 서 있는 듯한 신비로운 느낌을 줍니다.\n\n2. 만들어진 이미지로 영상 만들기\n만들어진 이미지를 첨부하고 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요\n[프롬프트]\n\n첨부한 이미지를 기반으로 광고 영상을 만들어줘!  \n\n3. 개인 인스타그램 개설 및 영상 올리기 📱 영상을 만드셨다면, 이제 세상에 보여줄 차례입니다!\n필수 시청! 계정 만들기: 인스타그램이 처음이신 분들은 아래 가이드 영상을 참고해 주세요.\n📺 인스타그램 설치부터 가입까지 완벽 가이드 [01:28]\n영상 업로드: 본인이 만든 영상을 '릴스(Reels)'나 '게시물'로 올려주세요. [13:05]", imageUrl: null },
            { id: 512, category: "5.지쿱AI대학교 일일과제", title: "1학년 12회차 과제", content: "[📢 지쿱 AI 네트워크마케팅 1학년 12회차 : 대한민국 쇼트트랙 금메달 기념 특집 및 인스타그램 업로드 안내]\n👇\n\n미션 1. 이미지 제작하기 🎬\n1. 여러분들의 사진과 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n   \n[프롬프트]\n{\n\n  \"project\": {\n\n    \"type\": \"초현실적인_스포츠_사진\",\n\n    \"goal\": \"실내_스피드_스케이팅_초상_전신_수직\",\n\n    \"aspect_ratio\": \"4:5\",\n\n    \"resolution\":\n\"1024x1280_이상\",\n\n    \"style\": \"사진처럼_실제적인,\n높은_디테일,\n전문_스포츠_편집\"\n\n  },\n\n  \"character_identity\": {\n\n    \"name\": \"이미지에서_참조된_인물\",\n\n    \"gender_presentation\": \"이미지에서_참조된_인물\",\n\n    \"body_type\": \"참조_이미지의_신체_유형_운동선수_핏_정의된_다리와_엉덩이\"\n\n  },\n\n  \"clothing\": {\n\n    \"category\": \"전문_한국_이미지에서_참조된_인물 성별_스피드_스케이팅_수트\",\n\n    \"fit\": \"피트한_공기역학적\",\n\n    \"material\": \"기술적_라이크라_스판덱스\",\n\n    \"main_colors\": {\n\n      \"torso_front\": \"한국_국기_요소가_포함된_네이비_블루\",\n\n      \"arms\": \"빨강_흰색_파랑_패턴\",\n\n      \"lower_body\": \"네이비_블루\"\n\n    }\n\n  },\n\n  \"pose_and_body_language\": {\n\n    \"stance\": \"훈련_사이_편안하게_서있음\",\n\n    \"body_orientation\": \"몸이_45도_뒤로_향함\",\n\n    \"upper_body\": \"카메라를_향해_약간_틀어짐\"\n\n  },\n\n  \"environment\": {\n\n    \"location_type\": \"실내_빙상_경기장\",\n\n    \"floor\": \"얼음_링크_표면\",\n\n    \"depth_of_field\": \"얕은_피사계심도\"\n\n  },\n\n  \"camera_settings\": {\n\n    \"lens\":\n\"85mm_f1_8\",\n\n    \"framing\": \"수직_전신_허벅지_중간_크롭_또는_전신\",\n\n    \"angle\": \"눈_레벨_조금_아래\"\n\n  },\n\n  \"quality_tags\": [\"초현실적인\",\n\"높은_디테일\",\n\"8k\", \"선명한_초점\", \"전문_스포츠_사진\"]\n\n}\n2. 만들어진 이미지로 영상 만들기\n만들어진 이미지를 첨부하고 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요\n[프롬프트]\n\n첨부한 이미지를 기반으로 광고 영상을 만들어줘!  \"지쿱 AI 대학교! 입학 하세요!\" 대한민국 금메달 축하! 축하! 텍스트는 없이 영상만 만들어줘\n\n3. 개인 인스타그램 개설 및 영상 올리기 📱 영상을 만드셨다면, 이제 세상에 보여줄 차례입니다!\n필수 시청! 계정 만들기: 인스타그램이 처음이신 분들은 아래 가이드 영상을 참고해 주세요.\n📺 인스타그램 설치부터 가입까지 완벽 가이드 [01:28]\n영상 업로드: 본인이 만든 영상을 '릴스(Reels)'나 '게시물'로 올려주세요. [13:05]", imageUrl: null },
            { id: 513, category: "5.지쿱AI대학교 일일과제", title: "1학년 13회차 과제", content: "[📢 지쿱 AI 네트워크마케팅 1학년 13회차 : 4회차 교육 프롬프트 복습]\n\n미션 1. 4회차 교육 프롬프트 이미지 (총10개) 복습하기 🎬\n1. 여러분들의 사진과 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n\n프롬프트 1. \n\n흑백 포토부스 스타일의 4x5 표현 그리드로, 모든 20개 패널에 동일한 첨부한 이미지의 인물이 등장하며, 각 패널마다 뚜렷하게 다른 표정을 보여줍니다...\n\n프롬프트 2. \n\n\"아늑한 예술가 스튜디오 안의 영화 같은 판타지 장면. 페인트 얼룩이 있는 앞치마를 입은 첨부한 이미지의 인물이 이젤에 앉아, 공중에 붓을 들고 캔버스를 차분하게 바라보고 있다...\"\n\n(중략 - 요청하신 원문 전체를 포함합니다)\n\n미션 2. 지쿱 AI 대학교 홍보 인스타그램 전문가 GEM 설정 후 위에서 만든 이미지로 인스타그램 올리기 \n\n1. GEM에 아래의 **프롬프트(명령어)**를 복사해서 제미나이에 입력해 주세요. \n2. GEM을 설정한 후 미션 1에서 만든 이미지를 바탕으로 공지를 만들어주세요 \n3. 본인의 인스타그램에 업로드 해주세요! \n\nGEM 프롬프트  \n\n지쿱 AI 대학교 홍보 인스타그램을 만들거야! \n이미지나 동영상을 올리면 지쿱 AI 대학교 입학하라는 내용으로 인스타그램 피드용으로 바꿔줘.\n이모지(✨🔥👍)를 풍부하게 사용해서 시선을 끌어줘.\n가독성을 위해 줄 바꿈을 자주 해줘.\n글은 500자 내에서 만들어줘. \n마지막에 #지쿱AI대학교 #지쿱김유신 #지쿱 #건강 #부업 등 관련 \n 해시태그 10개를 달아줘.", imageUrl: null },

            // GEMS
            { id: 601, category: "6.GEMS용프롬프트", title: "지쿱 관상 도사 GEMS 링크", content: "지쿱 관상 도사 링크 : \n\nhttps://gemini.google.com/gem/1Do7YMsBQETAlyO58qpCeeibnoTaZFF3y?usp=sharing", imageUrl: null },
            { id: 602, category: "6.GEMS용프롬프트", title: "지쿱 대박 도사", content: "지쿱 대박 도사 \n\n너는 긍정적인 해석을 해주는 사주 전문가야.\n생년월일을 입력받으면 초년, 중년, 말년 운을 풀이해 줘.", imageUrl: null },
            { id: 603, category: "6.GEMS용프롬프트", title: "지쿱 인스타그램 감성 마케터", content: "지쿱 인스타그램 감성 마케터\n\n내가 입력한 텍스트를 인스타그램 피드용으로 바꿔줘.\n이모지(✨🔥👍)를 풍부하게 사용해서 시선을 끌어줘.\n가독성을 위해 줄 바꿈을 자주 해줘.\n글은 500자 내에서 만들어줘. \n마지막에 #지쿱AI대학교 #지쿱김유신 #지쿱 #건강 #부업 등 관련 해시태그 5개를 달아줘.", imageUrl: null }
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [selectedCategory, setSelectedCategory] = useState("전체보기");
            const [searchQuery, setSearchQuery] = useState("");
            const [copiedId, setCopiedId] = useState(null);
            const [selectedPrompt, setSelectedPrompt] = useState(null);
            const [showToast, setShowToast] = useState(null);
            const scrollRef = useRef(null);

            const filteredPrompts = useMemo(() => {
                return INITIAL_PROMPTS.filter(p => {
                    const matchesCategory = selectedCategory === "전체보기" || p.category === selectedCategory;
                    const matchesSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          p.content.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });
            }, [selectedCategory, searchQuery]);

            const handleCopy = (e, text, id) => {
                if (e) e.stopPropagation();
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopiedId(id);
                setShowToast("프롬프트가 복사되었습니다!");
                setTimeout(() => { setCopiedId(null); setShowToast(null); }, 2000);
            };

            const handleDownload = (e, url, title) => {
                if (e) e.stopPropagation();
                if (!url) return;
                const link = document.createElement('a');
                link.href = url;
                link.download = `${title}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleShare = async (e, prompt) => {
                if (e) e.stopPropagation();
                if (navigator.share) {
                    try {
                        await navigator.share({ text: prompt.content });
                    } catch (err) {}
                } else {
                    handleCopy(null, prompt.content, prompt.id);
                }
            };

            return (
                <div className="min-h-screen bg-[#f8fafc] pb-24">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b px-4 py-4 shadow-sm">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex items-center justify-between mb-4">
                                <h1 className="text-[#4f46e5] font-black text-xl flex items-center gap-2">
                                    <Icon name="book-open" size={22} className="text-[#4f46e5]" />
                                    지쿱AI대학교 1학년 프롬프트북
                                </h1>
                                <div className="bg-[#eef2ff] text-[#4f46e5] px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border border-[#e0e7ff]">G-COOP UNIV</div>
                            </div>
                            <div className="relative group">
                                <Icon name="search" size={18} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors" />
                                <input 
                                    type="text" 
                                    placeholder="프롬프트 검색..." 
                                    className="w-full pl-11 pr-4 py-3 bg-slate-100 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all shadow-inner"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    {/* Category Scrollable Tabs */}
                    <nav className="sticky top-[125px] z-40 bg-white border-b overflow-hidden shadow-sm">
                        <div ref={scrollRef} className="flex items-center gap-2 overflow-x-auto no-scrollbar py-3.5 px-4 max-w-6xl mx-auto">
                            {CATEGORIES.map(cat => (
                                <button 
                                    key={cat} 
                                    onClick={() => setSelectedCategory(cat)} 
                                    className={`shrink-0 px-5 py-2 rounded-full text-[12px] font-extrabold transition-all border ${selectedCategory === cat ? 'bg-[#4f46e5] text-white border-[#4f46e5] shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-500 border-slate-200 hover:border-indigo-300 hover:text-indigo-600'}`}
                                >
                                    {cat === "전체보기" ? cat : cat.split('.')[1]}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Main Grid: Mobile 3 items per row */}
                    <main className="p-3 grid grid-cols-3 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2.5 max-w-6xl mx-auto">
                        {filteredPrompts.map(prompt => (
                            <div 
                                key={prompt.id} 
                                onClick={() => setSelectedPrompt(prompt)}
                                className="group bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 transition-all active:scale-[0.97] flex flex-col animate-fade-in cursor-pointer"
                            >
                                <div className="relative aspect-[3/4] bg-slate-50 overflow-hidden">
                                    {prompt.imageUrl ? (
                                        <img src={prompt.imageUrl} className="w-full h-full object-cover transition-transform group-hover:scale-105" loading="lazy" />
                                    ) : (
                                        <div className="w-full h-full flex items-center justify-center text-indigo-200">
                                            <Icon name="file-text" size={32} />
                                        </div>
                                    )}
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent"></div>
                                    <div className="absolute bottom-2 left-2 right-2">
                                        <span className="text-[7px] text-indigo-400 font-black block mb-0.5 truncate uppercase drop-shadow-md">{prompt.category.split('.')[0] || 'GEMS'}</span>
                                        <h3 className="text-[10px] sm:text-[13px] text-white font-bold leading-tight line-clamp-2 drop-shadow-md">{prompt.title}</h3>
                                    </div>
                                </div>

                                <div className="p-1.5 flex flex-col gap-1 mt-auto bg-white">
                                    <button 
                                        onClick={(e) => handleCopy(e, prompt.content, prompt.id)}
                                        className={`w-full py-1.5 rounded-lg text-[9px] font-black transition-all ${copiedId === prompt.id ? 'bg-green-500 text-white' : 'bg-slate-50 text-slate-600 hover:bg-indigo-50'}`}
                                    >
                                        복사
                                    </button>
                                    <div className="flex gap-1">
                                        <button 
                                            onClick={(e) => handleDownload(e, prompt.imageUrl, prompt.title)}
                                            className="flex-1 py-1.5 bg-slate-50 text-slate-400 border border-slate-100 rounded-lg flex justify-center hover:bg-indigo-50 hover:text-[#4f46e5]"
                                        >
                                            <Icon name="download" size={14} />
                                        </button>
                                        <button 
                                            onClick={(e) => handleShare(e, prompt)}
                                            className="flex-1 py-1.5 bg-slate-50 text-slate-400 border border-slate-100 rounded-lg flex justify-center hover:bg-indigo-50 hover:text-[#4f46e5]"
                                        >
                                            <Icon name="share-2" size={14} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Modal: Styled like 2.png */}
                    {selectedPrompt && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md" onClick={() => setSelectedPrompt(null)}></div>
                            <div className="relative bg-white w-full max-w-[420px] rounded-[3rem] overflow-hidden flex flex-col h-auto max-h-[92vh] shadow-2xl animate-in zoom-in-95 duration-300">
                                <button 
                                    onClick={() => setSelectedPrompt(null)} 
                                    className="absolute top-6 right-6 z-50 bg-black/30 text-white p-2.5 rounded-full hover:bg-black/50 transition-all backdrop-blur-sm"
                                >
                                    <Icon name="x" size={20} />
                                </button>
                                
                                <div className="overflow-y-auto no-scrollbar">
                                    {selectedPrompt.imageUrl && (
                                        <div className="w-full aspect-[4/5] relative bg-slate-100">
                                            <img src={selectedPrompt.imageUrl} className="w-full h-full object-cover" />
                                            <div className="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-white via-white/40 to-transparent"></div>
                                        </div>
                                    )}

                                    <div className="px-8 pb-10 pt-4">
                                        <div className="flex items-center justify-between mb-4">
                                            <span className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-3.5 py-1.5 rounded-full border border-indigo-100 uppercase tracking-tighter shadow-sm">{selectedPrompt.category}</span>
                                            <button onClick={(e) => handleShare(e, selectedPrompt)} className="flex items-center gap-1.5 text-slate-400 font-bold text-[11px] hover:text-indigo-600">
                                                <Icon name="share-2" size={14} /> 공유
                                            </button>
                                        </div>
                                        <h2 className="text-xl font-black text-slate-900 mb-5 leading-tight tracking-tight">{selectedPrompt.title}</h2>
                                        
                                        <div className="bg-slate-100/60 p-5 rounded-[2rem] border border-slate-200/50 mb-8 shadow-inner">
                                            <p className="text-slate-700 text-[14px] font-medium leading-relaxed whitespace-pre-wrap custom-scrollbar max-h-64 overflow-y-auto pr-2">
                                                {selectedPrompt.content}
                                            </p>
                                        </div>
                                        
                                        <div className="flex flex-col gap-3.5">
                                            {!selectedPrompt.downloadOnly && (
                                                <button 
                                                    onClick={(e) => handleDownload(e, selectedPrompt.imageUrl, selectedPrompt.title)}
                                                    className="w-full py-4 bg-white border-2 border-indigo-100 text-[#4f46e5] rounded-[1.5rem] font-black text-[15px] flex items-center justify-center gap-2.5 shadow-sm hover:bg-indigo-50 transition-all"
                                                >
                                                    <Icon name="download" size={18} /> 이미지 저장
                                                </button>
                                            )}
                                            {selectedPrompt.downloadOnly && (
                                                <button 
                                                    onClick={(e) => handleDownload(e, selectedPrompt.imageUrl, selectedPrompt.title)}
                                                    className="w-full py-4 bg-[#4f46e5] text-white rounded-[1.5rem] font-black text-[15px] flex items-center justify-center gap-2.5 shadow-xl transition-all active:scale-[0.97]"
                                                >
                                                    <Icon name="download" size={18} /> 이미지 다운로드
                                                </button>
                                            )}
                                            {!selectedPrompt.downloadOnly && (
                                                <button 
                                                    onClick={(e) => handleCopy(e, selectedPrompt.content, selectedPrompt.id)}
                                                    className={`w-full py-4 rounded-[1.5rem] font-black text-[15px] shadow-xl shadow-indigo-100 flex items-center justify-center gap-2.5 transition-all active:scale-[0.97] ${copiedId === selectedPrompt.id ? 'bg-green-500 text-white' : 'bg-[#4f46e5] text-white hover:bg-[#4338ca]'}`}
                                                >
                                                    <Icon name="copy" size={18} /> {copiedId === selectedPrompt.id ? '복사 완료' : '프롬프트 복사하기'}
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Alert */}
                    {showToast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[110] bg-slate-900/95 backdrop-blur-md text-white px-6 py-3.5 rounded-2xl shadow-2xl text-[13px] font-bold flex items-center gap-3 animate-bounce">
                            <Icon name="check-circle" size={18} className="text-green-400" /> {showToast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
