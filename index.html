            { id: 502, category: "5.지쿱AI대학교 일일과제", title: "1학년 2회차 과제 : 말하는 AI 영상 제작", content: "[📢 지쿱 AI 1학년 2회차 과제]\n🎬 포스터 인물이 말하는 영상 만들기\n대사: 'AI로 부자되는 길, 직쿠웁 AI 대학교에 입팍카세요~'", imageUrl: null },
            { id: 503, category: "5.지쿱AI대학교 일일과제", title: "1학년 3회차 과제 : 스마트폰 입체 이미지", content: "스마트폰에서 '지쿱 AI 대학교' 글씨가 입체로 튀어나오는 이미지 및 소리 포함 영상 제작 미션.", imageUrl: null },
            { id: 504, category: "5.지쿱AI대학교 일일과제", title: "1학년 4회차 과제 : 디엘릭서 브라운 광고", content: "디엘릭서 브라운 제품을 들고 있는 사진 및 대사 포함 홍보 영상 제작 미션.", imageUrl: "images/5-4.jpg" },
            { id: 505, category: "5.지쿱AI대학교 일일과제", title: "1학년 5회차 과제 : 텔로메라 세럼 화보", content: "텔로메라 세럼을 소중하게 감싸 쥔 아침 햇살 컨셉의 고화질 화보 및 줌인 광고 영상 제작.", imageUrl: "images/5-5.jpg" },
            { id: 508, category: "5.지쿱AI대학교 일일과제", title: "[SNS업로드금지] 1학년 8회차 : 피카츄 포스터", content: "피카츄와 장난스럽게 상호작용하는 옐로우 니트 차림의 인물 포스터 및 영상 제작.", imageUrl: null },
            { id: 509, category: "5.지쿱AI대학교 일일과제", title: "[SNS업로드금지] 1학년 9회차 : 3D 제품 광고", content: "꼬부기 프롬프트를 활용한 CK 광고 스타일의 3D 거대 제품 합성 포스터 미션.", imageUrl: null },
            { id: 511, category: "5.지쿱AI대학교 일일과제", title: "1학년 11회차 : 하이앵글 LOMO 화보", content: "바닥에 깔린 수많은 광고판 위에 서 있는 하이 앵글 시점의 신비로운 제품 광고 포스터 제작.", imageUrl: null },
            { id: 512, category: "5.지쿱AI대학교 일일과제", title: "1학년 12회차 : 쇼트트랙 금메달 기념", content: "쇼트트랙 수트를 입은 국가대표 컨셉의 초실사 스포츠 사진 및 축하 영상 제작 미션.", imageUrl: null },
            { id: 513, category: "5.지쿱AI대학교 일일과제", title: "1학년 13회차 : 교육 프롬프트 10종 복습", content: "4회차 교육에서 배운 핵심 프롬프트 10종 복습 및 인스타그램 마케팅용 GEM 설정 미션.", imageUrl: null },

            // --- GEMS용 ---
            { id: 601, category: "6.GEMS용프롬프트", title: "지쿱 관상 도사 GEMS 링크", content: "지쿱 관상 도사 \nhttps://gemini.google.com/gem/1Do7YMsBQETAlyO58qpCeeibnoTaZFF3y?usp=sharing", imageUrl: null },
            { id: 602, category: "6.GEMS용프롬프트", title: "지쿱 대박 도사 설정용 프롬프트", content: "너는 긍정적인 해석을 해주는 사주 전문가야. 생년월일을 입력받으면 초년, 중년, 말년 운을 풀이해 줘. 마지막엔 반드시 ‘귀인은 당신 곁에 있습니다’라고 해.", imageUrl: null },
            { id: 603, category: "6.GEMS용프롬프트", title: "지쿱 인스타그램 감성 마케터", content: "내가 입력한 텍스트를 인스타그램 피드용으로 바꿔줘. 이모지를 풍부하게 사용하고 가독성을 위해 줄 바꿈을 자주 해줘.", imageUrl: null }
        ];

        // --- 아이콘 컴포넌트 ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [prompts] = useState(INITIAL_PROMPTS);
            const [selectedCategory, setSelectedCategory] = useState("전체보기");
            const [searchQuery, setSearchQuery] = useState("");
            const [copiedId, setCopiedId] = useState(null);
            const [selectedPrompt, setSelectedPrompt] = useState(null);
            const [showToast, setShowToast] = useState(null);

            const filteredPrompts = useMemo(() => {
                return prompts.filter(p => {
                    const formattedP = p.category.replace(/\s/g, '');
                    const formattedS = selectedCategory.replace(/\s/g, '');
                    const matchesCategory = selectedCategory === "전체보기" || formattedP === formattedS;
                    const matchesSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          p.content.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });
            }, [selectedCategory, searchQuery, prompts]);

            const handleCopy = (text, id) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedId(id);
                    setTimeout(() => setCopiedId(null), 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleDownload = (e, url, title) => {
                if (e) e.stopPropagation();
                if (!url) return;
                const link = document.createElement('a');
                link.href = url;
                link.download = `${title}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleShare = async (e, prompt) => {
                if (e) e.stopPropagation();
                const shareData = {
                    title: `[지쿱 AI] ${prompt.title}`,
                    text: `${prompt.content}\n\n- 지쿱AI대학교 1학년 프롬프트북`,
                    url: window.location.href
                };
                if (navigator.share) {
                    try { await navigator.share(shareData); } catch (err) {}
                } else {
                    handleCopy(prompt.content, prompt.id);
                    setShowToast("프롬프트가 클립보드에 복사되었습니다.");
                    setTimeout(() => setShowToast(null), 3000);
                }
            };

            const handleVisitLink = (content) => {
                const urlMatch = content.match(/(https?:\/\/[^\s]+)/g);
                if (urlMatch) window.open(urlMatch[0], '_blank');
            };

            return (
                <div className="min-h-screen pb-24">
                    <header className="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b px-4 py-4 shadow-sm">
                        <div className="flex items-center justify-between mb-4">
                            <h1 className="text-2xl font-black text-indigo-700 flex items-center gap-2">
                                <Icon name="book-open" className="text-indigo-600" /> 지쿱AI대학교 1학년 프롬프트북
                            </h1>
                            <span className="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-3 py-1 rounded-full border border-indigo-100 uppercase tracking-tighter">G-Coop AI Univ</span>
                        </div>
                        <div className="relative">
                            <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                            <input type="text" placeholder="프롬프트 제목이나 내용 검색..." className="w-full pl-10 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                        </div>
                    </header>

                    <nav className="bg-white border-b sticky top-[125px] z-20 py-4 px-4 flex flex-wrap gap-2 justify-center shadow-sm">
                        {CATEGORIES.map(cat => (
                            <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-4 py-2.5 rounded-2xl text-[12px] font-bold border transition-all ${selectedCategory === cat ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg scale-105' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>{cat.includes('.') ? cat.split('.')[1].trim() : cat}</button>
                        ))}
                    </nav>

                    <main className="p-4 grid grid-cols-1 sm:grid-cols-2 gap-5 max-w-4xl mx-auto">
                        {filteredPrompts.map(prompt => {
                            const isSpecial = prompt.category.includes("일일과제") || prompt.category.includes("GEMS");
                            const hasLink = prompt.content.includes("http");
                            
                            return (
                                <div key={prompt.id} onClick={() => setSelectedPrompt(prompt)} className={`group bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-200 flex flex-col transition-all active:scale-95 cursor-pointer hover:shadow-xl relative ${isSpecial ? 'border-l-8 border-l-indigo-600 min-h-[160px]' : ''}`}>
                                    {!isSpecial && prompt.imageUrl && (
                                        <div className="relative aspect-[9/16] bg-slate-100 overflow-hidden">
                                            <img src={prompt.imageUrl} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy" onError={(e)=>{e.target.src='https://via.placeholder.com/720x1280?text=Image+Needed'}} />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent" />
                                            <div className="absolute bottom-4 left-4 right-4 text-white">
                                                <p className="text-[10px] font-bold text-indigo-300 uppercase mb-1">{prompt.category.split('.')[0] || 'G-COOP'}</p>
                                                <h3 className="font-bold text-lg leading-tight line-clamp-1">{prompt.title}</h3>
                                            </div>
                                        </div>
                                    )}

                                    {isSpecial && (
                                        <div className="p-6 flex-1 flex flex-col gap-3 bg-indigo-50/40">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-2 text-indigo-700">
                                                    <Icon name={hasLink ? "globe" : "clipboard-list"} size={22} />
                                                    <span className="text-[10px] font-black uppercase tracking-widest">{prompt.category.includes("GEMS") ? "GEMS Setting" : "Daily Task"}</span>
                                                </div>
                                                {prompt.imageUrl && (
                                                    <div className="bg-indigo-600 text-white p-1 rounded-md">
                                                        <Icon name="image" size={12} />
                                                    </div>
                                                )}
                                            </div>
                                            <h3 className="font-bold text-lg text-slate-900 leading-snug">{prompt.title}</h3>
                                            <p className="text-xs text-slate-600 line-clamp-2 leading-relaxed italic bg-white/60 p-3 rounded-xl border border-indigo-100">{prompt.content}</p>
                                        </div>
                                    )}

                                    <div className="p-4 bg-white flex gap-2 border-t border-slate-100 mt-auto">
                                        <button onClick={(e) => { e.stopPropagation(); handleCopy(prompt.content, prompt.id); }} className={`flex-1 py-3 rounded-xl text-[12px] font-black transition-all ${copiedId === prompt.id ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-700 hover:bg-indigo-600 hover:text-white'}`}>{copiedId === prompt.id ? '복사성공!' : '복사'}</button>
                                        
                                        {prompt.imageUrl && (
                                            <button onClick={(e) => handleDownload(e, prompt.imageUrl, prompt.title)} className="p-3 bg-slate-100 text-slate-500 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 border border-slate-200" title="이미지 저장">
                                                <Icon name="download" size={18} />
                                            </button>
                                        )}

                                        <button onClick={(e) => handleShare(e, prompt)} className="p-3 bg-slate-100 text-slate-500 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 border border-slate-200" title="공유하기">
                                            <Icon name="share-2" size={18} />
                                        </button>
                                        
                                        {hasLink && <button onClick={(e) => { e.stopPropagation(); handleVisitLink(prompt.content); }} className="p-3 bg-indigo-600 text-white rounded-xl shadow-lg active:scale-90"><Icon name="external-link" size={18} /></button>}
                                    </div>
                                </div>
                            );
                        })}
                    </main>

                    {selectedPrompt && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-md" onClick={() => setSelectedPrompt(null)} />
                            <div className="relative bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden flex flex-col max-h-[90vh] shadow-2xl animate-in zoom-in-95 duration-300">
                                <button onClick={() => setSelectedPrompt(null)} className="absolute top-5 right-5 z-10 bg-black/40 text-white p-2 rounded-full hover:bg-black/60 transition-colors"><Icon name="x" size={20} /></button>
                                
                                <div className="overflow-y-auto custom-scrollbar">
                                    {selectedPrompt.imageUrl && (
                                        <div className="w-full aspect-[9/16] bg-slate-100 relative">
                                            <img src={selectedPrompt.imageUrl} alt={selectedPrompt.title} className="w-full h-full object-cover" />
                                            <button 
                                                onClick={(e) => handleDownload(e, selectedPrompt.imageUrl, selectedPrompt.title)}
                                                className="absolute bottom-4 right-4 bg-white/20 backdrop-blur-xl text-white p-3 rounded-2xl transition-all shadow-lg flex items-center gap-2 border border-white/20"
                                            >
                                                <Icon name="download" size={20} />
                                                <span className="text-xs font-bold">이미지 저장</span>
                                            </button>
                                        </div>
                                    )}
                                    <div className="p-8">
                                        <div className="flex items-center justify-between mb-4">
                                            <span className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full border border-indigo-100 uppercase">{selectedPrompt.category}</span>
                                            <button onClick={(e) => handleShare(e, selectedPrompt)} className="flex items-center gap-1.5 text-slate-500 hover:text-indigo-600 transition-colors text-xs font-bold">
                                                <Icon name="share-2" size={16} /> 공유하기
                                            </button>
                                        </div>
                                        <h2 className="text-2xl font-black mb-6 text-slate-900 leading-tight">{selectedPrompt.title}</h2>
                                        <div className="bg-slate-50 p-6 rounded-3xl border border-slate-200 mb-8 shadow-inner">
                                            <p className="text-slate-800 text-base leading-relaxed whitespace-pre-wrap font-medium">{selectedPrompt.content}</p>
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <button onClick={() => handleCopy(selectedPrompt.content, selectedPrompt.id)} className={`w-full py-5 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-xl ${copiedId === selectedPrompt.id ? 'bg-green-500 text-white' : 'bg-indigo-600 text-white shadow-indigo-200'}`}>{copiedId === selectedPrompt.id ? '복사 완료!' : '전체 내용 복사하기'}</button>
                                            {selectedPrompt.content.includes("http") && <button onClick={() => handleVisitLink(selectedPrompt.content)} className="w-full py-4 rounded-2xl bg-white text-indigo-600 border-2 border-indigo-600 font-bold flex items-center justify-center gap-2">사이트 바로가기 <Icon name="external-link" size={18} /></button>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    {showToast && <div className="fixed bottom-24 left-4 right-4 z-[110] animate-in slide-in-from-bottom duration-300"><div className="bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold text-center">{showToast}</div></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
