            { id: 511, category: "5.지쿱AI대학교 일일과제", title: "11회차 : 하이앵글 LOMO 화보", content: "바닥에 깔린 수많은 광고판 위에 서 있는 하이 앵글 시점의 신비로운 제품 광고 포스터 제작.", imageUrl: null },
            { id: 512, category: "5.지쿱AI대학교 일일과제", title: "12회차 : 쇼트트랙 금메달 기념", content: "쇼트트랙 수트를 입은 국가대표 컨셉의 초실사 스포츠 사진 및 축하 영상 제작 미션.", imageUrl: null },
            { id: 513, category: "5.지쿱AI대학교 일일과제", title: "13회차 : 교육 프롬프트 10종 복습", content: "4회차 교육에서 배운 핵심 프롬프트 10종 복습:\n\n1. 흑백 포토부스 4x5\n2. 아늑한 예술가 드래곤\n3. 타임스 스퀘어 패션 화보\n4. 음료수 병 클로즈업 전문 사진\n5. 인생 여정 콜라주\n6. 불꽃 너머 시선 클로즈업\n7. 다이아몬드 교정기 입 내부 이미지\n8. 하이 앵글 스튜디오 헤일로\n9. 사바나 사자 초상화\n10. 보그 잡지 커버 실사\n\n위 프롬프트들을 활용하여 나만의 인스타그램 홍보 피드를 만들어보세요.", imageUrl: null },

            // --- GEMS용 ---
            { id: 601, category: "6.GEMS용프롬프트", title: "관상 도사 GEMS 링크", content: "지쿱 관상 도사 바로가기 링크:\nhttps://gemini.google.com/gem/1Do7YMsBQETAlyO58qpCeeibnoTaZFF3y?usp=sharing", imageUrl: null },
            { id: 602, category: "6.GEMS용프롬프트", title: "대박 도사 설정 프롬프트", content: "긍정적인 사주 전문가 GEM 설정용 문구. '귀인은 당신 곁에 있습니다' 멘트 필수.", imageUrl: null },
            { id: 603, category: "6.GEMS용프롬프트", title: "인스타그램 감성 마케터", content: "내가 입력한 텍스트를 인스타그램 피드용으로 바꿔줘. 이모지를 풍부하게 사용하고 가독성을 위해 줄 바꿈을 자주 해줘.", imageUrl: null }
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [prompts] = useState(INITIAL_PROMPTS);
            const [selectedCategory, setSelectedCategory] = useState("전체보기");
            const [searchQuery, setSearchQuery] = useState("");
            const [copiedId, setCopiedId] = useState(null);
            const [selectedPrompt, setSelectedPrompt] = useState(null);
            const [showToast, setShowToast] = useState(null);
            
            const scrollRef = useRef(null);

            const filteredPrompts = useMemo(() => {
                return prompts.filter(p => {
                    const formattedP = p.category.replace(/\s/g, '');
                    const formattedS = selectedCategory.replace(/\s/g, '');
                    const matchesCategory = selectedCategory === "전체보기" || formattedP === formattedS;
                    const matchesSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          p.content.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });
            }, [selectedCategory, searchQuery, prompts]);

            const handleCopy = (text, id) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                setCopiedId(id);
                setTimeout(() => setCopiedId(null), 2000);
                document.body.removeChild(textArea);
            };

            const handleDownload = (e, url, title) => {
                if (e) e.stopPropagation();
                if (!url) return;
                const link = document.createElement('a');
                link.href = url;
                link.download = `${title}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleShare = async (e, prompt) => {
                if (e) e.stopPropagation();
                // 팝업이나 카드 상관 없이 오직 프롬프트 내용만 공유하도록 설정
                const shareData = { text: prompt.content };
                if (navigator.share) {
                    try { await navigator.share(shareData); } catch (err) {}
                } else {
                    handleCopy(prompt.content, prompt.id);
                    setShowToast("클립보드에 복사되었습니다.");
                    setTimeout(() => setShowToast(null), 2000);
                }
            };

            const scrollNav = (direction) => {
                if (scrollRef.current) {
                    const scrollAmount = direction === 'left' ? -150 : 150;
                    scrollRef.current.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 pb-24 overflow-x-hidden">
                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-b px-4 py-3 h-16 flex flex-col justify-center shadow-sm">
                        <div className="flex items-center justify-between gap-2">
                            <h1 className="text-sm sm:text-base font-black text-indigo-700 flex items-center gap-1.5 shrink-0">
                                <Icon name="book-open" size={18} className="text-indigo-600" /> 
                                <span className="truncate">지쿱AI대학교 1학년 프롬프트북</span>
                            </h1>
                            <span className="bg-indigo-50 text-indigo-600 text-[8px] font-bold px-2 py-0.5 rounded-full border border-indigo-100 shrink-0">G-Coop Univ</span>
                        </div>
                    </header>

                    {/* Sub-Header with Scroll Nav */}
                    <div className="fixed top-16 left-0 right-0 z-30 bg-white border-b shadow-sm">
                        <div className="px-4 py-2 border-b bg-white">
                            <div className="relative">
                                <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="프롬프트 검색..." className="w-full pl-9 pr-4 py-2 bg-slate-100 border-none rounded-xl text-xs outline-none focus:ring-1 focus:ring-indigo-500" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                        </div>
                        
                        <div className="relative flex items-center bg-white px-1">
                            <button onClick={() => scrollNav('left')} className="p-2 text-slate-400 active:text-indigo-600 z-10 bg-white/80">
                                <Icon name="chevron-left" size={20} />
                            </button>
                            <nav ref={scrollRef} className="flex items-center gap-2 overflow-x-auto no-scrollbar py-3 flex-1 px-1">
                                {CATEGORIES.map(cat => (
                                    <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-[11px] font-bold border transition-all ${selectedCategory === cat ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                        {cat.includes('.') ? cat.split('.')[1].trim() : cat}
                                    </button>
                                ))}
                            </nav>
                            <button onClick={() => scrollNav('right')} className="p-2 text-slate-400 active:text-indigo-600 z-10 bg-white/80">
                                <Icon name="chevron-right" size={20} />
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="pt-44 p-3 grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 max-w-6xl mx-auto">
                        {filteredPrompts.map(prompt => {
                            const isSpecial = prompt.category.includes("일일과제") || prompt.category.includes("GEMS");
                            const hasImage = !!prompt.imageUrl;

                            return (
                                <div key={prompt.id} onClick={() => setSelectedPrompt(prompt)} className="group bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 flex flex-col transition-all active:scale-95 cursor-pointer relative min-h-[160px]">
                                    {!isSpecial && hasImage ? (
                                        <div className="relative aspect-[9/16] sm:aspect-[4/5] bg-slate-100 overflow-hidden">
                                            <img src={prompt.imageUrl} className="w-full h-full object-cover" loading="lazy" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-80" />
                                            <div className="absolute bottom-2 left-2 right-2 text-white">
                                                <p className="text-[8px] font-bold text-indigo-300 mb-0.5 truncate uppercase">{prompt.category.split('.')[0] || '지쿱'}</p>
                                                <h3 className="font-bold text-[11px] leading-tight line-clamp-1">{prompt.title}</h3>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className={`p-4 flex-1 flex flex-col gap-2 ${isSpecial ? 'bg-indigo-50/40' : 'bg-slate-50/50'}`}>
                                            <div className="flex items-center gap-1.5 text-indigo-700">
                                                <Icon name={prompt.content.includes("http") ? "globe" : "clipboard-list"} size={14} />
                                                <span className="text-[9px] font-black uppercase tracking-tighter">{isSpecial ? "TASK" : "BASIC"}</span>
                                            </div>
                                            <h3 className="font-bold text-[12px] text-slate-900 leading-snug line-clamp-2">{prompt.title}</h3>
                                            <p className="text-[10px] text-slate-500 line-clamp-2 italic leading-relaxed">{prompt.content}</p>
                                        </div>
                                    )}

                                    <div className="p-2 bg-white flex gap-1 border-t border-slate-100 mt-auto">
                                        <button onClick={(e) => { e.stopPropagation(); handleCopy(prompt.content, prompt.id); }} className={`flex-1 py-1.5 rounded-lg text-[10px] font-bold ${copiedId === prompt.id ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-600'}`}>복사</button>
                                        {hasImage && (
                                            <button onClick={(e) => handleDownload(e, prompt.imageUrl, prompt.title)} className="p-1.5 bg-slate-50 text-slate-400 rounded-lg border border-slate-100 active:bg-indigo-50"><Icon name="download" size={14} /></button>
                                        )}
                                        <button onClick={(e) => handleShare(e, prompt)} className="p-1.5 bg-slate-50 text-slate-400 rounded-lg border border-slate-100 active:bg-indigo-50"><Icon name="share-2" size={14} /></button>
                                    </div>
                                </div>
                            );
                        })}
                    </main>

                    {/* Detail Modal - Full Screen Style / No Scroll Optimization */}
                    {selectedPrompt && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 overflow-hidden">
                            <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md" onClick={() => setSelectedPrompt(null)} />
                            <div className="relative bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden flex flex-col h-auto max-h-[90vh] shadow-2xl animate-in zoom-in-95 duration-300">
                                <button onClick={() => setSelectedPrompt(null)} className="absolute top-4 right-4 z-50 bg-black/40 text-white p-2 rounded-full hover:bg-black/60 transition-all"><Icon name="x" size={18} /></button>
                                
                                <div className="flex flex-col h-full overflow-hidden">
                                    {/* Modal Image Area */}
                                    {selectedPrompt.imageUrl && (
                                        <div className="w-full shrink-0 h-[35vh] overflow-hidden relative bg-slate-100 border-b border-slate-100">
                                            <img src={selectedPrompt.imageUrl} className="w-full h-full object-contain" />
                                        </div>
                                    )}

                                    {/* Modal Info & Content Area */}
                                    <div className="p-5 flex flex-col min-h-0 flex-1">
                                        <div className="flex items-center justify-between mb-2">
                                            <span className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full border border-indigo-100 uppercase tracking-tight">{selectedPrompt.category}</span>
                                            {/* Popup Share: Strictly Content Only */}
                                            <button onClick={(e) => handleShare(e, selectedPrompt)} className="flex items-center gap-1 text-slate-400 text-[10px] font-bold active:text-indigo-600">
                                                <Icon name="share-2" size={12} /> 공유
                                            </button>
                                        </div>
                                        <h2 className="text-lg font-black text-slate-900 mb-3 leading-tight truncate">{selectedPrompt.title}</h2>
                                        
                                        {/* Scrollable text box for longer prompts */}
                                        <div className="bg-slate-100/50 p-4 rounded-xl border border-slate-100 shadow-inner flex-1 overflow-y-auto custom-scrollbar mb-4">
                                            <p className="text-slate-800 text-[13px] leading-relaxed whitespace-pre-wrap font-medium">
                                                {selectedPrompt.content}
                                            </p>
                                        </div>
                                        
                                        {/* Bottom Action Buttons */}
                                        <div className="grid grid-cols-1 gap-2 shrink-0">
                                            <button onClick={() => handleCopy(selectedPrompt.content, selectedPrompt.id)} className={`py-3.5 rounded-xl font-bold text-sm shadow-md transition-all active:scale-95 ${copiedId === selectedPrompt.id ? 'bg-green-500 text-white' : 'bg-indigo-600 text-white shadow-indigo-200'}`}>
                                                {copiedId === selectedPrompt.id ? '복사 완료!' : '프롬프트 복사하기'}
                                            </button>
                                            {selectedPrompt.imageUrl && (
                                                <button onClick={(e) => handleDownload(e, selectedPrompt.imageUrl, selectedPrompt.title)} className="py-2.5 rounded-xl bg-white border border-indigo-200 text-indigo-600 font-bold text-xs flex items-center justify-center gap-2 active:bg-indigo-50">
                                                    <Icon name="download" size={14} /> 이미지 저장
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showToast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[110] bg-slate-800 text-white px-5 py-2 rounded-full shadow-2xl text-[11px] font-bold">
                            {showToast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
